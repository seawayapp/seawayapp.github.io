<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SeawayApp — Educational resources and tools">
  <link rel="icon" href="./favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <title>SeawayApp</title>
  <script defer src="data.js"></script>
  <script defer src="script.js"></script>
</head>

<body>

  <!-- ── Navbar ── -->
  <nav class="navbar">
    <div class="nav-inner">
      <a class="nav-brand" href="#">
        <span class="brand-dot"></span>
        SeawayApp
      </a>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links" id="navLinks">
        <li class="nav-item">
          <button class="nav-link nav-dd-btn" id="dd-btn-recent" aria-expanded="false" aria-haspopup="true">
            Recent<svg class="dd-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="nav-dropdown" id="dd-recent"></div>
        </li>
        <li class="nav-item">
          <button class="nav-link nav-dd-btn" id="dd-btn-pinned" aria-expanded="false" aria-haspopup="true">
            Pinned<svg class="dd-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="nav-dropdown" id="dd-pinned"></div>
        </li>
        <li class="nav-item">
          <button class="nav-link nav-dd-btn" id="dd-btn-archive" aria-expanded="false" aria-haspopup="true">
            Archive<svg class="dd-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="nav-dropdown" id="dd-archive"></div>
        </li>
      </ul>
    </div>
  </nav>

  <!-- ── Hero ── -->
  <section class="hero">
    <div class="hero-inner">
      <p class="hero-eyebrow">Welcome to</p>
      <h1 class="hero-title">SeawayApp</h1>
      <p class="hero-sub">Educational resources, language tools &amp; more — all in one place.</p>
      <div class="hero-actions">
        <a href="#recent"  class="btn btn-primary">What's New</a>
        <a href="#pinned" class="btn btn-ghost">Browse All</a>
      </div>
    </div>
    <div class="hero-bg-grid" aria-hidden="true"></div>
  </section>

  <!-- ── Main ── -->
  <main class="wrap">

    <!-- Recent -->
    <section class="content-section" id="recent">
      <div class="section-header">
        <div class="section-label">Latest</div>
        <h2 class="section-title">Recent Releases</h2>
      </div>
      <div class="release-list" id="recent-list"></div>
    </section>

    <!-- Pinned -->
    <section class="content-section" id="pinned">
      <div class="section-header">
        <div class="section-label">Featured</div>
        <h2 class="section-title">Pinned Modules</h2>
      </div>
      <div class="card-grid" id="pin-grid"></div>
    </section>

    <!-- Archive -->
    <section class="content-section" id="archive">
      <div class="section-header">
        <div class="section-label">History</div>
        <h2 class="section-title">Archive</h2>
        <button class="toggle-archive" id="archiveToggle" onclick="toggleArchive()">
          Show all <span id="archiveCount"></span> ▾
        </button>
      </div>
      <div class="archive-list" id="archive-list"></div>
    </section>

  </main>

  <!-- ── Footer ── -->
  <footer class="site-footer">
    <div class="footer-inner">
      <span class="footer-brand">SeawayApp</span>
      <span class="footer-sep">·</span>
      <span>Last updated: <span id="last-updated"></span></span>
    </div>
  </footer>

  <script>
    // Hamburger — close open dropdowns when toggling the mobile menu
    document.getElementById("navToggle").addEventListener("click", () => {
      const nl = document.getElementById("navLinks");
      nl.classList.toggle("open");
      nl.querySelectorAll('.nav-dropdown.open').forEach(d => d.classList.remove('open'));
      nl.querySelectorAll('.nav-dd-btn').forEach(b => b.setAttribute('aria-expanded', 'false'));
    });

    // Archive toggle
    let archiveExpanded = false;
    function toggleArchive() {
      archiveExpanded = !archiveExpanded;
      document.getElementById("archive-list").classList.toggle("expanded", archiveExpanded);
      document.getElementById("archiveToggle").innerHTML = archiveExpanded
        ? "Show less ▴"
        : `Show all <span id="archiveCount">${document.querySelectorAll(".archive-item").length}</span> ▾`;
    }
  </script>

</body>
</html>
