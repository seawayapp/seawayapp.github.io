<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <!-- <script src="../../nav-top.js"></script> -->
  <title>爱书的孩子</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      user-select: none;
      background: #000;
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }

    /* ── BACKGROUND ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: url('innerMainbgImgUrl.jpg') center / cover no-repeat;
      z-index: 0;
    }

    /* ── STAGE ── */
    #stage {
      position: fixed;
      inset: 0;
      z-index: 1;
      /* perspective for the 3-D flip */
      perspective: 2400px;
      perspective-origin: center center;
    }

    /* ── CURRENT PAGE (static, always behind flipper) ── */
    #panelA {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #panelA img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      pointer-events: none;
    }

    /* ── CROSSFADE TRANSITION ── */
    #panelB {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.55s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
    }

    #panelB img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      pointer-events: none;
    }

    /* ── SIDE ARROWS (large, always visible, loop-capable) ── */
    .side-arrow {
      position: fixed;
      top: 0;
      bottom: 0;
      width: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
      transition: background 0.2s;
    }

    .side-arrow:hover {
      background: rgba(0, 0, 0, 0.10);
    }

    .side-arrow:active {
      background: rgba(0, 0, 0, 0.20);
    }

    #arrowLeft {
      left: 0;
    }

    #arrowRight {
      right: 0;
    }

    .arrow-circle {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.18);
      border: 2px solid rgba(255, 255, 255, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.18s, transform 0.15s;
      backdrop-filter: blur(6px);
    }

    .side-arrow:hover .arrow-circle {
      background: rgba(255, 255, 255, 0.32);
      transform: scale(1.1);
    }

    .side-arrow:active .arrow-circle {
      transform: scale(0.95);
    }

    .side-arrow svg {
      pointer-events: none;
    }

    /* ── TOP BAR (auto-hide) ── */
    #topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 52px;
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.72), transparent);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      z-index: 20;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    body:hover #topbar,
    #topbar:focus-within {
      opacity: 1;
      pointer-events: auto;
    }

    .tb-title {
      color: rgba(255, 255, 255, 0.9);
      font-size: 15px;
      font-weight: 500;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.6);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: opacity 0.15s;
    }

    .tb-title:hover {
      opacity: 0.75;
    }

    .tb-right {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .tb-btn {
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: rgba(255, 255, 255, 0.8);
      width: 34px;
      height: 34px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      backdrop-filter: blur(4px);
    }

    .tb-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
    }

    .tb-btn svg {
      pointer-events: none;
    }

    /* ── PAGE COUNTER ── */
    #counter {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    body:hover #counter {
      opacity: 1;
    }

    #counterText {
      color: rgba(255, 255, 255, 0.78);
      font-size: 13px;
      background: rgba(0, 0, 0, 0.45);
      border-radius: 20px;
      padding: 4px 16px;
      backdrop-filter: blur(6px);
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
      white-space: nowrap;
    }

    /* ── THUMBNAIL DRAWER ── */
    #thumbDrawer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(6, 6, 12, 0.97);
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      padding: 12px 16px 16px;
      display: none;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
      max-height: 190px;
      overflow-y: auto;
      z-index: 30;
      backdrop-filter: blur(16px);
    }

    .th {
      width: 44px;
      height: 58px;
      border-radius: 3px;
      overflow: hidden;
      cursor: pointer;
      border: 1.5px solid rgba(255, 255, 255, 0.1);
      transition: all 0.15s;
      background: #222;
      position: relative;
      flex-shrink: 0;
    }

    .th img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .th:hover {
      transform: scale(1.1);
      border-color: rgba(255, 255, 255, 0.4);
    }

    .th.active {
      border-color: #4a9eff;
      box-shadow: 0 0 8px rgba(74, 158, 255, 0.5);
    }

    .th .tnum {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 8px;
      color: rgba(255, 255, 255, 0.75);
      background: rgba(0, 0, 0, 0.55);
      padding: 1px 0 2px;
    }

    /* ── TABLET / SMALL SCREEN: compact arrows ── */
    @media (max-width: 1024px) {
      .side-arrow {
        top: 50%;
        bottom: auto;
        transform: translateY(-50%);
        width: 52px;
        height: 64px;
        border-radius: 4px;
      }

      .side-arrow:hover {
        background: transparent;
      }

      .arrow-circle {
        width: 48px;
        height: 48px;
        background: rgba(0, 0, 0, 0.25);
        border: 2px solid rgba(255, 255, 255, 0.3);
        backdrop-filter: none;
        -webkit-backdrop-filter: none;
      }
    }
  </style>
</head>

<body>

  <div id="stage">
    <div id="panelA"></div>
    <div id="panelB"></div>
  </div>

  <!-- LEFT ARROW -->
  <div class="side-arrow" id="arrowLeft" onclick="prev()">
    <div class="arrow-circle">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6" />
      </svg>
    </div>
  </div>

  <!-- RIGHT ARROW -->
  <div class="side-arrow" id="arrowRight" onclick="next()">
    <div class="arrow-circle">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 6 15 12 9 18" />
      </svg>
    </div>
  </div>

  <!-- TOP BAR -->
  <div id="topbar">
    <a class="tb-title" href="../index.html">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6" />
      </svg>
      爱书的孩子
    </a>
    <div class="tb-right">
      <button class="tb-btn" title="缩略图" id="thumbBtn" onclick="toggleThumbs()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7" />
          <rect x="14" y="3" width="7" height="7" />
          <rect x="3" y="14" width="7" height="7" />
          <rect x="14" y="14" width="7" height="7" />
        </svg>
      </button>
      <button class="tb-btn" title="全屏" onclick="toggleFullscreen()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15 3 21 3 21 9" />
          <polyline points="9 21 3 21 3 15" />
          <line x1="21" y1="3" x2="14" y2="10" />
          <line x1="3" y1="21" x2="10" y2="14" />
        </svg>
      </button>
    </div>
  </div>

  <!-- PAGE COUNTER -->
  <div id="counter"><span id="counterText"></span></div>

  <!-- THUMBNAIL DRAWER -->
  <div id="thumbDrawer"></div>

  <script>
    const TOTAL = 18;
    const IMG = i => `./data/Slide${i}.PNG`;

    let cur = 1;
    let busy = false;

    const panelA = document.getElementById('panelA');
    const panelB = document.getElementById('panelB');

    function render(animate) {
      if (!animate) {
        panelA.innerHTML = `<img src="${IMG(cur)}" draggable="false" alt="第${cur}页">`;
        updateUI();
        return;
      }

      busy = true;
      const img = new Image();
      img.draggable = false;
      img.alt = `第${cur}页`;

      img.onload = () => {
        panelB.innerHTML = '';
        panelB.appendChild(img);
        panelB.style.transition = 'none';
        panelB.style.opacity = '0';

        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            panelB.style.transition = 'opacity 0.55s cubic-bezier(0.4, 0, 0.2, 1)';
            panelB.style.opacity = '1';
          });
        });

        panelB.addEventListener('transitionend', () => {
          panelA.innerHTML = panelB.innerHTML;
          panelB.style.transition = 'none';
          panelB.style.opacity = '0';
          panelB.innerHTML = '';
          busy = false;
        }, { once: true });

        updateUI();
      };

      img.onerror = () => {
        panelA.innerHTML = `<img src="${IMG(cur)}" draggable="false" alt="第${cur}页">`;
        busy = false;
        updateUI();
      };

      img.src = IMG(cur);
    }

    function updateUI() {
      document.getElementById('counterText').textContent = `${cur} / ${TOTAL}`;
      document.querySelectorAll('.th').forEach((t, i) => {
        t.classList.toggle('active', i + 1 === cur);
      });
    }

    function go(dir) {
      if (busy) return;
      cur = dir === 'fwd'
        ? (cur >= TOTAL ? 1 : cur + 1)
        : (cur <= 1 ? TOTAL : cur - 1);
      render(true);
    }

    function next() { go('fwd'); }
    function prev() { go('bwd'); }

    function jump(idx) {
      const t = Math.max(1, Math.min(idx, TOTAL));
      if (t === cur || busy) return;
      cur = t;
      render(true);
    }

    /* thumbnails */
    function buildThumbs() {
      const drawer = document.getElementById('thumbDrawer');
      for (let i = 1; i <= TOTAL; i++) {
        const d = document.createElement('div');
        d.className = 'th';
        d.title = `第 ${i} 页`;
        d.innerHTML = `<img src="${IMG(i)}" loading="lazy"><div class="tnum">${i}</div>`;
        d.addEventListener('click', () => { jump(i); toggleThumbs(); });
        drawer.appendChild(d);
      }
    }

    let thumbsOpen = false;
    function toggleThumbs() {
      thumbsOpen = !thumbsOpen;
      document.getElementById('thumbDrawer').style.display = thumbsOpen ? 'flex' : 'none';
      document.getElementById('thumbBtn').style.outline = thumbsOpen ? '2px solid rgba(74,158,255,0.7)' : '';
    }

    function toggleFullscreen() {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => { });
      else document.exitFullscreen();
    }

    /* keyboard */
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' || e.key === 'PageDown') { e.preventDefault(); next(); }
      if (e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); prev(); }
      if (e.key === 'Escape' && thumbsOpen) toggleThumbs();
    });

    /* swipe */
    let tx = 0;
    document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive: true });
    document.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - tx;
      if (Math.abs(dx) > 50) dx < 0 ? next() : prev();
    }, { passive: true });

    buildThumbs();
    render(false);
  </script>
</body>

</html>
