<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>四书背诵 · Sìshū Study</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Noto+Serif+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════
   DESIGN TOKENS
══════════════════════════════════════ */
:root {
  --ink:         #1a1208;
  --ink-mid:     #3d2e14;
  --ink-light:   #7a6240;
  --paper:       #f7f3eb;
  --paper-warm:  #ede8dc;
  --paper-deep:  #e0d9ca;
  --gold:        #b8860b;
  --gold-light:  #d4a942;
  --red:         #8b1a1a;
  --blue-en:     #1e4d8c;
  --rule:        rgba(90,60,20,.18);
  --shadow:      rgba(30,15,0,.14);
  --sidebar-w:   260px;
  --topbar-h:    52px;
  --progress-h:  3px;
  --offset:      calc(var(--topbar-h) + var(--progress-h));
  --trans:       .28s cubic-bezier(.4,0,.2,1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; overflow: hidden;
  background: var(--paper);
  color: var(--ink);
  font-family: 'Noto Serif SC', serif;
  font-size: 15px;
  line-height: 1.7;
}
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 2px; }

/* ══════════════════════════════════════
   TOP BAR
══════════════════════════════════════ */
#topbar {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--topbar-h);
  background: var(--ink);
  display: flex; align-items: center;
  padding: 0 12px 0 8px;
  z-index: 200;
  box-shadow: 0 2px 10px rgba(0,0,0,.35);
  gap: 8px;
}

/* ── hamburger toggle ── */
#sidebar-toggle {
  width: 38px; height: 38px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 5px;
  background: transparent; border: none;
  cursor: pointer; border-radius: 6px;
  transition: background var(--trans);
  flex-shrink: 0; padding: 0;
}
#sidebar-toggle:hover,
#sidebar-toggle:focus-visible { background: rgba(255,255,255,.09); outline: none; }
#sidebar-toggle span {
  display: block;
  width: 20px; height: 2px;
  background: rgba(255,255,255,.78);
  border-radius: 1px;
  transition: transform var(--trans), opacity var(--trans), width var(--trans);
  transform-origin: center;
}
body.sidebar-open  #sidebar-toggle span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
body.sidebar-open  #sidebar-toggle span:nth-child(2) { opacity: 0; width: 0; }
body.sidebar-open  #sidebar-toggle span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

#topbar .title-main {
  font-family: 'Noto Serif SC', serif;
  font-size: 16px; font-weight: 700;
  color: var(--gold-light);
  letter-spacing: .12em;
  flex: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#topbar .title-sub {
  font-family: 'EB Garamond', serif;
  font-size: 12px; color: rgba(255,255,255,.36);
  font-style: italic; letter-spacing: .04em;
  white-space: nowrap;
}
#progress-text {
  font-size: 11px; color: rgba(255,255,255,.42);
  font-family: 'EB Garamond', serif; font-style: italic;
  white-space: nowrap;
}

/* progress strip */
#progress-bar-wrap {
  position: fixed; top: var(--topbar-h); left: 0; right: 0;
  height: var(--progress-h); background: rgba(0,0,0,.2); z-index: 200;
}
#progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--gold-light));
  transition: width .5s ease; width: 0%;
}

/* ══════════════════════════════════════
   LAYOUT
══════════════════════════════════════ */
#layout {
  display: flex;
  height: 100vh;
  height: 100dvh;
  padding-top: var(--offset);
  position: relative;
  overflow: hidden;
}

/* ══════════════════════════════════════
   BACKDROP (mobile overlay)
══════════════════════════════════════ */
#sidebar-backdrop {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.48);
  z-index: 149;
  opacity: 0;
  transition: opacity var(--trans);
  pointer-events: none;
}
body.sidebar-open  #sidebar-backdrop { opacity: 1; pointer-events: auto; }
body.sidebar-closed #sidebar-backdrop { opacity: 0; pointer-events: none; }

/* ══════════════════════════════════════
   SIDEBAR
══════════════════════════════════════ */
#sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  background: var(--ink);
  overflow-y: auto; overflow-x: hidden;
  padding: 8px 0 80px;
  position: relative; z-index: 150;
  transition: transform var(--trans), margin-right var(--trans);
}

/* Desktop closed — slide left, reclaim space via negative margin */
body.sidebar-closed #sidebar {
  transform: translateX(calc(-1 * var(--sidebar-w)));
  margin-right: calc(-1 * var(--sidebar-w));
}
body.sidebar-open #sidebar {
  transform: translateX(0);
  margin-right: 0;
  box-shadow: none;
}

/* Book groups */
.book-header {
  display: flex; align-items: center;
  padding: 10px 14px 9px;
  cursor: pointer; user-select: none;
  border-bottom: 1px solid rgba(255,255,255,.06);
  transition: background .15s;
}
.book-header:hover { background: rgba(255,255,255,.05); }
.book-name { font-size: 14px; font-weight: 700; color: var(--gold-light); letter-spacing: .1em; flex: 1; }
.book-label { font-family: 'EB Garamond', serif; font-size: 11px; font-style: italic; color: rgba(255,255,255,.28); }
.book-arrow { font-size: 9px; color: rgba(255,255,255,.28); margin-left: 7px; transition: transform .22s; }
.book-group.open .book-arrow { transform: rotate(90deg); }
.chapter-list { display: none; background: rgba(0,0,0,.22); padding: 3px 0; }
.book-group.open .chapter-list { display: block; }

.ch-btn {
  display: flex; align-items: center;
  width: 100%; border: none; background: transparent;
  padding: 7px 14px 7px 22px;
  cursor: pointer; text-align: left; gap: 8px;
  transition: background .15s;
  -webkit-tap-highlight-color: transparent;
}
.ch-btn:active, .ch-btn:hover { background: rgba(255,255,255,.06); }
.ch-btn.active { background: rgba(184,134,11,.16); }
.ch-dot {
  width: 7px; height: 7px; border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,.2); flex-shrink: 0;
  transition: background .2s, border-color .2s;
}
.ch-btn.memorized .ch-dot { background: var(--gold); border-color: var(--gold); }
.ch-btn.partial    .ch-dot { background: rgba(184,134,11,.5); border-color: var(--gold); }
.ch-name { font-size: 13px; color: rgba(255,255,255,.72); flex: 1; }
.ch-btn.active .ch-name { color: var(--gold-light); }
.ch-sub {
  font-size: 10px; color: rgba(255,255,255,.28);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 76px; font-style: italic; font-family: 'EB Garamond', serif;
}

/* ══════════════════════════════════════
   MAIN
══════════════════════════════════════ */
#main {
  flex: 1; display: flex; flex-direction: column;
  overflow: hidden; background: var(--paper);
  min-width: 0;
}

/* Control bar */
#ctrl-bar {
  display: flex; align-items: center;
  padding: 0 14px;
  min-height: 44px;
  background: var(--paper-warm);
  border-bottom: 1px solid var(--rule);
  gap: 5px; flex-shrink: 0;
  flex-wrap: wrap; row-gap: 0;
}
.mode-label {
  font-size: 11px; color: var(--ink-light);
  font-family: 'EB Garamond', serif; font-style: italic;
}
.ctrl-group {
  display: flex; border: 1px solid var(--rule); border-radius: 4px; overflow: hidden;
}
.ctrl-btn {
  border: none; background: transparent;
  padding: 5px 9px; font-size: 12px;
  font-family: 'Noto Serif SC', serif; color: var(--ink-mid);
  cursor: pointer; transition: background .15s, color .15s;
  white-space: nowrap; -webkit-tap-highlight-color: transparent; line-height: 1.4;
}
.ctrl-btn + .ctrl-btn { border-left: 1px solid var(--rule); }
.ctrl-btn:active, .ctrl-btn:hover { background: var(--paper-deep); }
.ctrl-btn.on { background: var(--ink); color: var(--paper); }
.ctrl-sep { width: 1px; background: var(--rule); margin: 6px 3px; flex-shrink: 0; }

/* Scroll area */
#scroll-area {
  flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding: 28px 40px 80px;
}
#scroll-inner { max-width: 740px; margin: 0 auto; }

/* chapter heading */
#ch-title-block { margin-bottom: 28px; padding-bottom: 16px; border-bottom: 1px solid var(--rule); }
#ch-title-block h2 { font-size: 21px; font-weight: 700; letter-spacing: .14em; color: var(--ink); }
#ch-title-block .ch-subtitle {
  font-size: 13px; color: var(--ink-light); margin-top: 4px;
  font-style: italic; font-family: 'EB Garamond', serif; letter-spacing: .05em;
}

/* sentence card */
.s-card {
  margin-bottom: 20px; border: 1px solid var(--rule); border-radius: 6px;
  background: var(--paper); overflow: hidden; transition: box-shadow .2s;
}
.s-card:hover { box-shadow: 0 2px 12px var(--shadow); }
.s-main { padding: 14px 18px 10px; }
.s-pinyin {
  font-size: 12px; color: var(--ink-light); letter-spacing: .06em;
  margin-bottom: 5px; font-family: 'EB Garamond', serif; line-height: 1.6;
}
.s-text {
  font-size: 19px; line-height: 1.9; letter-spacing: .06em;
  color: var(--ink); position: relative; user-select: none;
}

/* cover modes */
.mode-word .s-text .zh-char {
  background: var(--ink); color: var(--ink);
  border-radius: 2px; cursor: pointer; transition: color .12s; display: inline-block;
}
.mode-word .s-text .zh-char.revealed { color: var(--paper); }
.mode-full .s-text::after {
  content: ''; position: absolute; inset: -2px -4px;
  background: var(--ink); border-radius: 3px; cursor: pointer;
}
.mode-full .s-text.revealed::after { display: none; }

.s-en {
  font-family: 'Book Antiqua', 'Palatino Linotype', Palatino, serif;
  font-style: normal;
  font-size: 16px; color: var(--blue-en); margin-top: 10px;
  line-height: 1.6; padding-top: 10px;
  border-top: 1px dashed rgba(30,77,140,.15);
  transition: opacity .2s;
}
.s-note {
  font-size: 12px; color: var(--ink-light); background: var(--paper-warm);
  padding: 8px 18px; border-top: 1px solid var(--rule); line-height: 1.7;
}
.s-foot {
  display: flex; justify-content: flex-end; align-items: center;
  padding: 6px 12px; background: var(--paper-warm); border-top: 1px solid var(--rule);
}
.mem-btn {
  border: 1px solid var(--rule); background: transparent;
  padding: 4px 12px; border-radius: 20px; font-size: 11px; cursor: pointer;
  font-family: 'Noto Serif SC', serif; color: var(--ink-light);
  transition: all .15s; -webkit-tap-highlight-color: transparent; min-height: 30px;
}
.mem-btn:active, .mem-btn:hover { border-color: var(--gold); color: var(--gold); }
.mem-btn.done { background: var(--gold); border-color: var(--gold); color: #fff; }

/* chapter nav */
#ch-nav {
  display: flex; justify-content: space-between; align-items: center;
  padding: 22px 0 0; border-top: 1px solid var(--rule); margin-top: 8px;
}
.nav-btn {
  border: 1px solid var(--rule); background: var(--paper-warm);
  padding: 8px 16px; border-radius: 4px; font-size: 13px; cursor: pointer;
  font-family: 'Noto Serif SC', serif; color: var(--ink-mid);
  transition: all .15s; min-height: 36px; -webkit-tap-highlight-color: transparent;
}
.nav-btn:active, .nav-btn:hover { background: var(--ink); color: var(--paper); }
.nav-btn:disabled { opacity: .3; cursor: default; }
#ch-nav-info { font-size: 12px; color: var(--ink-light); font-family: 'EB Garamond', serif; font-style: italic; }

/* welcome */
#welcome {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; padding: 40px 24px; text-align: center; color: var(--ink-light);
}
#welcome h1 { font-size: 30px; letter-spacing: .2em; color: var(--ink); margin-bottom: 10px; }
#welcome .sub { font-family: 'EB Garamond', serif; font-style: italic; font-size: 15px; letter-spacing: .05em; margin-bottom: 28px; }
#welcome .desc { font-size: 13px; line-height: 2; max-width: 380px; }

/* loading */
#loading-msg {
  display: none; text-align: center; padding: 60px 20px; color: var(--ink-light);
  font-size: 14px; font-family: 'EB Garamond', serif; font-style: italic;
}

/* visibility toggles */
.hide-pinyin .s-pinyin { display: none; }
.hide-en     .s-en     { display: none; }
.hide-note   .s-note   { display: none; }

/* ══════════════════════════════════════
   MOBILE  ≤ 600px
   Sidebar floats over content as overlay
══════════════════════════════════════ */
@media (max-width: 600px) {
  :root { --topbar-h: 48px; --sidebar-w: min(82vw, 280px); }

  /* Sidebar becomes a fixed overlay, never pushes layout */
  #sidebar {
    position: fixed;
    top: var(--offset); left: 0;
    height: calc(100vh - var(--offset));
    height: calc(100dvh - var(--offset));
    margin-right: 0 !important;
    z-index: 150;
  }
  body.sidebar-open  #sidebar { transform: translateX(0); box-shadow: 6px 0 28px rgba(0,0,0,.45); }
  body.sidebar-closed #sidebar { transform: translateX(calc(-1 * var(--sidebar-w))); }

  /* Backdrop shown on mobile */
  #sidebar-backdrop { display: block; }

  /* Compact topbar */
  #topbar .title-sub { display: none; }
  #progress-text { font-size: 10px; }

  /* Compact scroll area — extra bottom space for iOS browser chrome + home indicator */
  #scroll-area { padding: 16px 14px calc(100px + env(safe-area-inset-bottom, 0px)); }

  /* Ctrl bar wraps gracefully */
  #ctrl-bar { padding: 6px 10px; min-height: auto; row-gap: 5px; }
  .ctrl-sep { display: none; }
  .mode-label { display: none; }

  .s-text { font-size: 17px; }
  .s-main { padding: 12px 14px 8px; }
  .s-en   { font-size: 13px; }
  #ch-title-block h2 { font-size: 18px; }
  .nav-btn { padding: 7px 12px; font-size: 12px; }
}

/* ══════════════════════════════════════
   TABLET  601–900px
   Sidebar closed by default, overlays content
══════════════════════════════════════ */
@media (min-width: 601px) and (max-width: 900px) {
  :root { --sidebar-w: 248px; }

  #sidebar {
    position: fixed;
    top: var(--offset); left: 0;
    height: calc(100vh - var(--offset));
    margin-right: 0 !important;
  }
  body.sidebar-open  #sidebar { transform: translateX(0); box-shadow: 4px 0 24px rgba(0,0,0,.35); }
  body.sidebar-closed #sidebar { transform: translateX(calc(-1 * var(--sidebar-w))); }

  #sidebar-backdrop { display: block; }
  #topbar .title-sub { display: none; }
  #scroll-area { padding: 22px 26px 80px; }
}

/* ══════════════════════════════════════
   DESKTOP ≥ 901px
   Sidebar pushes layout (default behaviour)
   Backdrop not needed
══════════════════════════════════════ */
@media (min-width: 901px) {
  #sidebar-backdrop { display: none !important; }
}
</style>
</head>

          <button class="nav-btn" id="btn-next-ch" onclick="navChapter(1)">下一章 →</button>
        </div>
      </div>
    </div>
  </div>
</div>

/* ════════════════════════════════════════
   STATE
════════════════════════════════════════ */
const DATA_PATH = './data/';
const MEM_KEY   = 'sishu_mem_v2';
let bookCache        = {};
let currentMode      = 'read';
let currentBookId    = null;
let currentChapterId = null;
let mem              = {};

const ALL_CHAPTERS = BOOKS.flatMap(b =>
  b.chapters.map(c => ({ bookId: b.id, chapterId: c.id }))
);

function loadMem()   { try { mem = JSON.parse(localStorage.getItem(MEM_KEY) || '{}'); } catch { mem = {}; } }
function saveMem()   { localStorage.setItem(MEM_KEY, JSON.stringify(mem)); }
function uid(b,c,i)  { return `${b}:${c}:${i}`; }
function isMobile()  { return window.innerWidth <= 600; }
function isTablet()  { return window.innerWidth <= 900; }

/* ════════════════════════════════════════
   SIDEBAR TOGGLE
════════════════════════════════════════ */
function toggleSidebar() {
  document.body.classList.contains('sidebar-open') ? closeSidebar() : openSidebar();
}
function openSidebar() {
  document.body.classList.replace('sidebar-closed','sidebar-open') ||
  document.body.classList.add('sidebar-open');
  document.body.classList.remove('sidebar-closed');
  if (!isTablet()) localStorage.setItem('sishu_sidebar','1');
}
function closeSidebar() {
  document.body.classList.replace('sidebar-open','sidebar-closed') ||
  document.body.classList.add('sidebar-closed');
  document.body.classList.remove('sidebar-open');
  if (!isTablet()) localStorage.setItem('sishu_sidebar','0');
}

/* ════════════════════════════════════════
   SCRIPT LOADER
════════════════════════════════════════ */
function loadScript(filePath) {
  return new Promise((resolve, reject) => {
    window.chapterData = undefined;
    const s = document.createElement('script');
    s.src = filePath; s.type = 'text/javascript';
    s.onload = () => typeof chapterData !== 'undefined'
      ? resolve(chapterData)
      : reject(new Error('chapterData not found in ' + filePath));
    s.onerror = () => reject(new Error('Failed to load: ' + filePath));
    document.body.appendChild(s);
  });
}

async function getChapterData(bookId, chapterId) {
  if (!bookCache[bookId]) {
    const book = BOOKS.find(b => b.id === bookId);
    if (!book) throw new Error('Unknown book: ' + bookId);
    bookCache[bookId] = await loadScript(DATA_PATH + book.file);
  }
  return bookCache[bookId].chapters.find(c => c.id === chapterId) || null;
}

/* ════════════════════════════════════════
   SIDEBAR BUILD
════════════════════════════════════════ */
function buildSidebar() {
  const nav = document.getElementById('sidebar');
  nav.innerHTML = '';
  BOOKS.forEach(book => {
    const grp = document.createElement('div');
    grp.className = 'book-group'; grp.id = 'grp-' + book.id;

    const hdr = document.createElement('div');
    hdr.className = 'book-header';
    hdr.innerHTML = `<span class="book-name">${book.name}</span>
      <span class="book-label">${book.label}</span>
      <span class="book-arrow">▶</span>`;
    hdr.onclick = () => grp.classList.toggle('open');

    const list = document.createElement('div');
    list.className = 'chapter-list'; list.id = 'chlist-' + book.id;

    book.chapters.forEach(ch => {
      const btn = document.createElement('button');
      btn.className = 'ch-btn'; btn.id = 'chbtn-' + ch.id;
      btn.innerHTML = `<span class="ch-dot"></span>
        <span class="ch-name">${ch.name}</span>
        <span class="ch-sub">${ch.subtitle}</span>`;
      btn.onclick = () => {
        loadChapter(book.id, ch.id);
        if (isTablet()) closeSidebar();
      };
      list.appendChild(btn);
    });

    grp.appendChild(hdr);
    grp.appendChild(list);
    nav.appendChild(grp);
  });
}

/* ════════════════════════════════════════
   LOAD CHAPTER
════════════════════════════════════════ */
async function loadChapter(bookId, chapterId) {
  currentBookId = bookId; currentChapterId = chapterId;

  document.querySelectorAll('.ch-btn').forEach(b => b.classList.remove('active'));
  const ab = document.getElementById('chbtn-' + chapterId);
  if (ab) {
    ab.classList.add('active');
    document.getElementById('grp-' + bookId)?.classList.add('open');
    ab.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }

  document.getElementById('welcome').style.display        = 'none';
  document.getElementById('loading-msg').style.display    = 'block';
  document.getElementById('ch-title-block').style.display = 'none';
  document.getElementById('sentences-wrap').innerHTML     = '';
  document.getElementById('ch-nav').style.display         = 'none';

  let chapter;
  try { chapter = await getChapterData(bookId, chapterId); }
  catch(e) { document.getElementById('loading-msg').textContent = '加载失败：' + e.message; return; }

  document.getElementById('loading-msg').style.display = 'none';
  if (!chapter) {
    document.getElementById('loading-msg').style.display = 'block';
    document.getElementById('loading-msg').textContent   = '章节数据未找到';
    return;
  }
  renderChapter(bookId, chapter);
}

function renderChapter(bookId, chapter) {
  document.getElementById('ch-title-block').style.display = 'block';
  document.getElementById('ch-h2').textContent  = chapter.name;
  document.getElementById('ch-sub').textContent = chapter.subtitle || '';

  const wrap = document.getElementById('sentences-wrap');
  wrap.innerHTML = '';
  chapter.sentences.forEach((s, idx) =>
    wrap.appendChild(buildCard(s, uid(bookId, chapter.id, idx), bookId, chapter.id, idx))
  );

  renderNav(bookId, chapter.id);
  updateProgress();
  updateSidebarDots();
  document.getElementById('scroll-area').scrollTop = 0;
}

/* ── sentence card ── */
function buildCard(s, uidStr, bookId, chapterId, idx) {
  const card = document.createElement('div');
  card.className = 's-card';
  card.id = 'card-' + uidStr.replace(/:/g,'-');
  const isDone = !!mem[uidStr];

  const main = document.createElement('div');
  main.className = 's-main';

  if (s.pinyin) {
    const py = document.createElement('div');
    py.className = 's-pinyin'; py.textContent = s.pinyin;
    main.appendChild(py);
  }

  const td = document.createElement('div');
  td.className = 's-text';
  td.innerHTML = wrapChars(s.text);
  td.addEventListener('click', e => {
    if (currentMode === 'word') e.target.closest('.zh-char')?.classList.toggle('revealed');
    else if (currentMode === 'full') td.classList.toggle('revealed');
  });
  main.appendChild(td);

  if (s.en) {
    const en = document.createElement('div');
    en.className = 's-en'; en.textContent = s.en;
    main.appendChild(en);
  }
  card.appendChild(main);

  if (s.note) {
    const note = document.createElement('div');
    note.className = 's-note'; note.textContent = s.note;
    card.appendChild(note);
  }

  const foot = document.createElement('div');
  foot.className = 's-foot';
  const mb = document.createElement('button');
  mb.className = 'mem-btn' + (isDone ? ' done' : '');
  mb.textContent = isDone ? '✓ 已背' : '标记已背';
  mb.onclick = () => toggleMem(uidStr, mb, bookId, chapterId);
  foot.appendChild(mb);
  card.appendChild(foot);
  return card;
}

function wrapChars(text) {
  return [...text].map(ch =>
    /[\u4e00-\u9fff\u3400-\u4dbf]/.test(ch)
      ? `<span class="zh-char">${ch}</span>` : ch
  ).join('');
}

/* ════════════════════════════════════════
   MEMORY
════════════════════════════════════════ */
function toggleMem(uidStr, btn, bookId, chapterId) {
  if (mem[uidStr]) { delete mem[uidStr]; btn.className='mem-btn'; btn.textContent='标记已背'; }
  else             { mem[uidStr]=true;   btn.className='mem-btn done'; btn.textContent='✓ 已背'; }
  saveMem(); updateProgress(); updateSidebarDots();
}
function markAllChapter() {
  if (!currentBookId || !currentChapterId) return;
  document.querySelectorAll('.s-card').forEach((card, idx) => {
    const u = uid(currentBookId, currentChapterId, idx);
    mem[u] = true;
    const b = card.querySelector('.mem-btn');
    if (b) { b.className='mem-btn done'; b.textContent='✓ 已背'; }
  });
  saveMem(); updateProgress(); updateSidebarDots();
}
function clearAllMem() {
  if (!confirm('确定要清除所有背诵记录吗？')) return;
  mem = {}; saveMem();
  document.querySelectorAll('.mem-btn').forEach(b => { b.className='mem-btn'; b.textContent='标记已背'; });
  updateProgress(); updateSidebarDots();
}
function countMemCh(bId, cId, total) {
  let n=0;
  for (let i=0;i<total;i++) if (mem[uid(bId,cId,i)]) n++;
  return n;
}
function updateProgress() {
  const done = Object.keys(mem).length;
  let total  = 0;
  BOOKS.forEach(b => {
    if (bookCache[b.id]) total += bookCache[b.id].chapters.reduce((s,c)=>s+c.sentences.length,0);
  });
  const pct = total>0 ? Math.round(done/total*100) : 0;
  document.getElementById('progress-bar-fill').style.width = pct+'%';
  document.getElementById('progress-text').textContent = total>0 ? `${done}/${total} · ${pct}%` : '';
}
function updateSidebarDots() {
  BOOKS.forEach(book => {
    if (!bookCache[book.id]) return;
    book.chapters.forEach(ch => {
      const total = bookCache[book.id].chapters.find(c=>c.id===ch.id)?.sentences.length||0;
      const done  = countMemCh(book.id, ch.id, total);
      const btn   = document.getElementById('chbtn-'+ch.id);
      if (!btn) return;
      btn.classList.remove('memorized','partial');
      if (total>0 && done===total) btn.classList.add('memorized');
      else if (done>0)             btn.classList.add('partial');
    });
  });
}

/* ════════════════════════════════════════
   NAVIGATION
════════════════════════════════════════ */
function renderNav(bookId, chapterId) {
  const nav = document.getElementById('ch-nav');
  nav.style.display = 'flex';
  const idx = ALL_CHAPTERS.findIndex(c=>c.bookId===bookId&&c.chapterId===chapterId);
  document.getElementById('btn-prev-ch').disabled = idx<=0;
  document.getElementById('btn-next-ch').disabled = idx>=ALL_CHAPTERS.length-1;
  document.getElementById('ch-nav-info').textContent = `${idx+1} / ${ALL_CHAPTERS.length}`;
}
function navChapter(delta) {
  const idx  = ALL_CHAPTERS.findIndex(c=>c.bookId===currentBookId&&c.chapterId===currentChapterId);
  const next = idx+delta;
  if (next<0||next>=ALL_CHAPTERS.length) return;
  loadChapter(ALL_CHAPTERS[next].bookId, ALL_CHAPTERS[next].chapterId);
}

/* ════════════════════════════════════════
   MODE & VIZ
════════════════════════════════════════ */
function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.ctrl-btn[data-mode]').forEach(b=>b.classList.toggle('on',b.dataset.mode===mode));
  document.querySelectorAll('.zh-char').forEach(c=>c.classList.remove('revealed'));
  document.querySelectorAll('.s-text').forEach(t=>t.classList.remove('revealed'));
  const wrap = document.getElementById('sentences-wrap');
  wrap.classList.remove('mode-word','mode-full');
  if (mode==='word') wrap.classList.add('mode-word');
  if (mode==='full') wrap.classList.add('mode-full');
}
const VIZ = { pinyin:{btn:'btn-pinyin',cls:'hide-pinyin'}, note:{btn:'btn-note',cls:'hide-note'}, en:{btn:'btn-en',cls:'hide-en'} };
function toggleViz(key) {
  const {btn,cls} = VIZ[key];
  const on = document.getElementById(btn).classList.toggle('on');
  document.getElementById('scroll-area').classList.toggle(cls, !on);
}

/* ════════════════════════════════════════
   KEYBOARD
════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (e.key==='ArrowLeft')  navChapter(-1);
  if (e.key==='ArrowRight') navChapter(1);
  if (e.key==='\\')         toggleSidebar();
});

/* ════════════════════════════════════════
   INIT
════════════════════════════════════════ */
loadMem();
buildSidebar();
updateProgress();

// VIZ buttons start off → apply hide classes immediately
document.getElementById('scroll-area').classList.add('hide-pinyin','hide-note','hide-en');

// Sidebar initial state
if (isTablet()) {
  closeSidebar();  // mobile & tablet start closed
} else {
  // Desktop: restore last preference
  const pref = localStorage.getItem('sishu_sidebar');
  if (pref === '0') closeSidebar();
  // else stays open (body.sidebar-open from HTML)
}
