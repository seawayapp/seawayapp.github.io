<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="SeawayApp Books — A curated collection of bilingual books and classic Chinese literature for children and students.">
  <title>Books - 书籍</title>
  <script src="../nav-config.js"></script>
  <script>
    window.NAV_CONFIG = {
      breadcrumbs: [
        { label: "Home", href: "../index.html", children: NAV_MENUS.site() },
        { label: "Books" }
      ]
    };
  </script>
  <script src="../nav-top.js"></script>
  <script src="./data/booklist.js" defer></script>
  <style>
    :root {
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
      --accent-dim: rgba(37, 99, 235, 0.10);
      --text: #1e293b;
      --text-muted: #64748b;
      --text-light: #94a3b8;
      --bg: #f8fafc;
      --surface: #ffffff;
      --border: #e2e8f0;
      --radius: 12px;
      --shadow: 0 2px 12px rgba(0, 0, 0, 0.07);
      --font: "Inter", "Segoe UI", system-ui, sans-serif;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .page-wrap {
      max-width: 780px;
      margin: 0 auto;
      padding: 36px 20px 60px;
    }

    .page-header {
      margin-bottom: 28px;
    }

    .page-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--accent-dark);
      background: var(--accent-dim);
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 10px;
    }

    .page-title {
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.5px;
      line-height: 1.2;
    }

    .page-count {
      margin-top: 6px;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .book-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .book-card {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      text-decoration: none;
      color: var(--text);
      box-shadow: var(--shadow);
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
      cursor: pointer;
    }

    .book-card:hover {
      border-color: var(--accent);
      box-shadow: 0 4px 20px rgba(37, 99, 235, 0.15);
      transform: translateX(4px);
      text-decoration: none;
      color: var(--text);
    }

    .book-num {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: var(--accent-dim);
      color: var(--accent-dark);
      font-size: 0.85rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .book-body {
      flex: 1;
      min-width: 0;
    }

    .book-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .book-subtitle {
      margin-top: 3px;
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .book-arrow {
      color: var(--text-light);
      font-size: 1.1rem;
      flex-shrink: 0;
      transition: transform 0.2s, color 0.2s;
    }

    .book-card:hover .book-arrow {
      transform: translateX(4px);
      color: var(--accent-dark);
    }

    .state-msg {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    @media (max-width: 480px) {
      .page-wrap {
        padding: 24px 14px 48px;
      }

      .book-card {
        padding: 14px 16px;
        gap: 12px;
      }

      .book-title {
        font-size: 0.92rem;
      }

      .book-num {
        width: 32px;
        height: 32px;
        font-size: 0.78rem;
        border-radius: 8px;
      }
    }
  </style>
</head>

<body>
  <div class="page-wrap">

    <div class="page-header">
      <div class="page-eyebrow">📚 Books</div>
      <h1 class="page-title">Books - 书籍</h1>
      <p class="page-count" id="pageCount"></p>
    </div>

    <div class="book-list" id="mainContent">
      <div class="state-msg">Loading...</div>
    </div>

  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      try {
        const container = document.getElementById("mainContent");
        container.innerHTML = "";

        document.getElementById("pageCount").textContent =
          `${mainData.length} book${mainData.length !== 1 ? "s" : ""}`;

        mainData.forEach((item, index) => {
          const card = document.createElement("a");
          card.className = "book-card";
          card.href = item.category === "file"
            ? `./Book_Template.html?input=${item.filename}`
            : `./${item.filename}`;

          card.innerHTML = `
            <div class="book-num">${index + 1}</div>
            <div class="book-body">
              <div class="book-title">${item.title || ""}</div>
              ${item.subtitle ? `<div class="book-subtitle">${item.subtitle}</div>` : ""}
            </div>
            <span class="book-arrow">→</span>`;

          container.appendChild(card);
        });
      } catch (error) {
        console.error("Failed to load data:", error);
        document.getElementById("mainContent").innerHTML =
          '<div class="state-msg">Error loading data. Please refresh.</div>';
      }
    });
  </script>
</body>

</html>
