<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SeawayApp Math — Interesting math problems, visual proofs, and topic-based practice for primary and secondary students.">
  <title>Math - 数学</title>
  <script>
    window.NAV_CONFIG = {
      breadcrumbs: [
        { label: "Home", href: "../index.html" },
        { label: "Math" }
      ]
    };
  </script>
  <script src="../nav-top.js"></script>
  <style>
    :root {
      --accent: #059669;
      --accent-dark: #047857;
      --accent-dim: rgba(5, 150, 105, 0.10);
      --text: #1e293b;
      --text-muted: #64748b;
      --text-light: #94a3b8;
      --bg: #f8fafc;
      --surface: #ffffff;
      --border: #e2e8f0;
      --radius: 12px;
      --shadow: 0 2px 12px rgba(0, 0, 0, 0.07);
      --font: "Inter", "Segoe UI", system-ui, sans-serif;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .page-wrap {
      max-width: 780px;
      margin: 0 auto;
      padding: 36px 20px 60px;
    }

    .page-header {
      margin-bottom: 28px;
    }

    .page-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--accent-dark);
      background: var(--accent-dim);
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 10px;
    }

    .page-title {
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.5px;
      line-height: 1.2;
    }

    .page-count {
      margin-top: 6px;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .topic-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .topic-card {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      text-decoration: none;
      color: var(--text);
      box-shadow: var(--shadow);
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
      cursor: pointer;
    }

    .topic-card:hover {
      border-color: var(--accent);
      box-shadow: 0 4px 20px rgba(5, 150, 105, 0.15);
      transform: translateX(4px);
      text-decoration: none;
      color: var(--text);
    }

    .topic-num {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: var(--accent-dim);
      color: var(--accent-dark);
      font-size: 0.85rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .topic-body {
      flex: 1;
      min-width: 0;
    }

    .topic-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .topic-subtitle {
      margin-top: 3px;
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .topic-arrow {
      color: var(--text-light);
      font-size: 1.1rem;
      flex-shrink: 0;
      transition: transform 0.2s, color 0.2s;
    }

    .topic-card:hover .topic-arrow {
      transform: translateX(4px);
      color: var(--accent-dark);
    }

    /* ── Category cards (has sub-questions) ── */
    .topic-card.is-category {
      border-left: 4px solid #7c3aed;
      background: linear-gradient(to right, rgba(124, 58, 237, 0.04), var(--surface));
    }

    .topic-card.is-category:hover {
      border-left-color: #7c3aed;
      border-color: #7c3aed;
      box-shadow: 0 4px 20px rgba(124, 58, 237, 0.15);
    }

    .topic-card.is-category .topic-num {
      background: rgba(124, 58, 237, 0.12);
      color: #7c3aed;
    }

    .topic-card.is-category .topic-num svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .topic-card.is-category:hover .topic-arrow {
      color: #7c3aed;
    }

    .topic-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 5px;
    }

    .tag-collection {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #7c3aed;
      background: rgba(124, 58, 237, 0.10);
      border: 1px solid rgba(124, 58, 237, 0.2);
      padding: 2px 7px;
      border-radius: 10px;
    }

    @media (max-width: 480px) {
      .page-wrap {
        padding: 24px 14px 48px;
      }

      .topic-card {
        padding: 14px 16px;
        gap: 12px;
      }

      .topic-title {
        font-size: 0.92rem;
      }

      .topic-num {
        width: 32px;
        height: 32px;
        font-size: 0.78rem;
        border-radius: 8px;
      }
    }
  </style>
</head>

<body>
  <div class="page-wrap">

    <div class="page-header">
      <div class="page-eyebrow">&#x2211; Math</div>
      <h1 class="page-title">Math - 数学</h1>
      <p class="page-count" id="pageCount"></p>
    </div>

    <div class="topic-list" id="mainContent"></div>

  </div>

  <script>
    const FOLDER_ICON = `<svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>`;

    const topics = [
      {
        title: "P5 Supposition",
        subtitle: "Primary 5 · Supposition Method",
        href: "./topics/P5_supposition_final.html"
      },
      {
        title: "P5 Remainder Concept",
        subtitle: "Primary 5 · Remainder Concept",
        href: "./topics/P5_remainder_concept.html"
      },
      {
        title: "Interesting Questions",
        subtitle: "Challenging problems with elegant solutions",
        href: "./Interesting_Questions/index.html",
        isCategory: true,
        count: 1
      }
    ];

    document.addEventListener("DOMContentLoaded", () => {
      const container = document.getElementById("mainContent");
      document.getElementById("pageCount").textContent =
        `${topics.length} topic${topics.length !== 1 ? "s" : ""}`;

      let topicNum = 0;
      topics.forEach((item) => {
        const card = document.createElement("a");
        card.href = item.href;

        if (item.isCategory) {
          card.className = "topic-card is-category";
          card.innerHTML = `
            <div class="topic-num">${FOLDER_ICON}</div>
            <div class="topic-body">
              <div class="topic-title">${item.title}</div>
              <div class="topic-meta">
                <span class="tag-collection">&#x25A6; Collection</span>
                ${item.count != null ? `<span class="topic-subtitle">${item.count} question${item.count !== 1 ? "s" : ""}</span>` : ""}
              </div>
              ${item.subtitle ? `<div class="topic-subtitle">${item.subtitle}</div>` : ""}
            </div>
            <span class="topic-arrow">&#x2192;</span>`;
        } else {
          topicNum++;
          card.className = "topic-card";
          card.innerHTML = `
            <div class="topic-num">${topicNum}</div>
            <div class="topic-body">
              <div class="topic-title">${item.title}</div>
              ${item.subtitle ? `<div class="topic-subtitle">${item.subtitle}</div>` : ""}
            </div>
            <span class="topic-arrow">&#x2192;</span>`;
        }

        container.appendChild(card);
      });
    });
  </script>
</body>

</html>
