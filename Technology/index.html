<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Technology</title>
  <script>
    window.NAV_CONFIG = {
      breadcrumbs: [
        { label: "Home",       href: "../index.html" },
        { label: "Technology" }
      ]
    };
  </script>
  <script src="../nav-top.js"></script>
  <style>
    :root {
      --green:      #92d050;
      --green-dark: #6aaa2a;
      --green-dim:  rgba(146,208,80,0.12);
      --text:       #1e293b;
      --text-muted: #64748b;
      --text-light: #94a3b8;
      --bg:         #f8fafc;
      --surface:    #ffffff;
      --border:     #e2e8f0;
      --radius:     12px;
      --shadow:     0 2px 12px rgba(0,0,0,0.07);
      --font:       "Inter", "Segoe UI", system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .page-wrap {
      max-width: 780px;
      margin: 0 auto;
      padding: 36px 20px 60px;
    }

    .page-header { margin-bottom: 28px; }

    .page-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--green-dark);
      background: var(--green-dim);
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 10px;
    }

    .page-title {
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.5px;
      line-height: 1.2;
    }

    .page-count {
      margin-top: 6px;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .lesson-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .lesson-card {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      text-decoration: none;
      color: var(--text);
      box-shadow: var(--shadow);
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
    }

    .lesson-card:hover {
      border-color: var(--green);
      box-shadow: 0 4px 20px rgba(146,208,80,0.18);
      transform: translateX(4px);
      text-decoration: none;
      color: var(--text);
    }

    .lesson-icon {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      background: var(--green-dim);
      color: var(--green-dark);
      font-size: 1.3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .lesson-body { flex: 1; min-width: 0; }

    .lesson-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
    }

    .lesson-subtitle {
      margin-top: 3px;
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .lesson-arrow {
      color: var(--text-light);
      font-size: 1.1rem;
      flex-shrink: 0;
      transition: transform 0.2s, color 0.2s;
    }

    .lesson-card:hover .lesson-arrow {
      transform: translateX(4px);
      color: var(--green-dark);
    }

    @media (max-width: 480px) {
      .page-wrap { padding: 24px 14px 48px; }
      .lesson-card { padding: 14px 16px; gap: 12px; }
      .lesson-icon { width: 36px; height: 36px; font-size: 1.1rem; }
    }
  </style>
</head>

<body>
  <div class="page-wrap">
    <div class="page-header">
      <div class="page-eyebrow">🛠 Technology</div>
      <h1 class="page-title">Technology</h1>
      <p class="page-count">3 tools</p>
    </div>

    <div class="lesson-list">
      <a class="lesson-card" href="Generate_QR_Code/index.html">
        <div class="lesson-icon">🔲</div>
        <div class="lesson-body">
          <div class="lesson-title">Generate QR Code</div>
          <div class="lesson-subtitle">Released 2024-10-28</div>
        </div>
        <span class="lesson-arrow">→</span>
      </a>

      <a class="lesson-card" href="QR_Code/qr-reader.html">
        <div class="lesson-icon">📷</div>
        <div class="lesson-body">
          <div class="lesson-title">Read QR Code</div>
          <div class="lesson-subtitle">Released 2026-03-17</div>
        </div>
        <span class="lesson-arrow">→</span>
      </a>

      <a class="lesson-card" href="Generate_Calendar/index.html">
        <div class="lesson-icon">📅</div>
        <div class="lesson-body">
          <div class="lesson-title">Generate Calendar</div>
          <div class="lesson-subtitle">Released 2025-01-01</div>
        </div>
        <span class="lesson-arrow">→</span>
      </a>
    </div>
  </div>

</body>

</html>
