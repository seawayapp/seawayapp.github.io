<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generate Calendar</title>
  <script>
    window.NAV_CONFIG = {
      breadcrumbs: [
        { label: "Home",              href: "../../index.html" },
        { label: "Technology",        href: "../index.html" },
        { label: "Generate Calendar" }
      ]
    };
  </script>
  <script src="../../nav-top.js"></script>
  <style>
    :root {
      --green:      #92d050;
      --green-dark: #6aaa2a;
      --green-dim:  rgba(146,208,80,0.12);
      --text:       #1e293b;
      --text-muted: #64748b;
      --text-light: #94a3b8;
      --bg:         #f8fafc;
      --surface:    #ffffff;
      --border:     #e2e8f0;
      --radius:     12px;
      --shadow:     0 2px 12px rgba(0,0,0,0.07);
      --font:       "Inter", "Segoe UI", system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .page-wrap {
      max-width: 780px;
      margin: 0 auto;
      padding: 36px 20px 60px;
    }

    .page-header { margin-bottom: 28px; }

    .page-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--green-dark);
      background: var(--green-dim);
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 10px;
    }

    .page-title {
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.5px;
      line-height: 1.2;
    }

    .page-count {
      margin-top: 6px;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    /* Year grid */
    .year-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 10px;
    }

    .year-card {
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 10px;
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
      box-shadow: var(--shadow);
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s, background 0.15s;
    }

    .year-card:hover {
      border-color: var(--green);
      background: var(--green-dim);
      box-shadow: 0 4px 20px rgba(146,208,80,0.18);
      transform: translateY(-2px);
      color: var(--green-dark);
      text-decoration: none;
    }

    .year-card.current-year {
      border-color: var(--green);
      background: var(--green-dim);
      color: var(--green-dark);
    }

    .page-footer {
      text-align: center;
      margin-top: 40px;
      font-size: 0.8rem;
      color: var(--text-light);
    }

    @media (max-width: 480px) {
      .page-wrap { padding: 24px 14px 48px; }
      .year-grid { grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 8px; }
      .year-card { padding: 14px 8px; font-size: 1rem; }
    }
  </style>
</head>

<body>
  <div class="page-wrap">
    <div class="page-header">
      <div class="page-eyebrow">📅 Technology</div>
      <h1 class="page-title">Generate Calendar 年历</h1>
      <p class="page-count" id="pageCount"></p>
    </div>

    <div class="year-grid" id="yearGrid"></div>

    <div class="page-footer">Last updated on 01/01/2025</div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      // Build year grid
      const currentYear = new Date().getFullYear();
      const grid = document.getElementById('yearGrid');
      const years = [];
      for (let y = 2016; y <= 2045; y++) years.push(y);

      document.getElementById('pageCount').textContent = `${years.length} years`;

      years.forEach(y => {
        const a = document.createElement('a');
        a.className = 'year-card' + (y === currentYear ? ' current-year' : '');
        a.href = `./Calendar_Template_Landscape.html?year=${y}`;
        a.target = '_blank';
        a.textContent = y;
        grid.appendChild(a);
      });
    });
  </script>
</body>

</html>
