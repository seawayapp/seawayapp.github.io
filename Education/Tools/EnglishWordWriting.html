<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>英文点读互动书写板</title>
    <script src="./js/vivus.min.js"></script>
    <style>
        :root {
            --line-main: #aad4ff;
            --line-sub: #ffcccc;
            --btn-bg: #4a90e2;
        }

        body {
            background: #f8fafc;
            font-family: 'Segoe UI', Arial;
            padding: 20px;
        }

        /* 顶部控制面板 */
        .controls {
            max-width: 900px;
            margin: 0 auto 30px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        textarea {
            width: 100%;
            height: 80px;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 18px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        .config-row {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 15px;
        }

        .speed-box {
            color: #64748b;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* 单词显示区域 */
        #display-container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px 15px;
            justify-content: center;
            max-width: 1100px;
            margin: 0 auto;
        }

        /* 单个单词包装 */
        .word-wrapper {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
        }

        .paper-word {
            position: relative;
            height: 250px;
            /* 恢复 250 高度，确保 y 不被切断 */
            background: white;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.03);
            overflow: hidden;
        }

        /* 辅助线逻辑 */
        .guidelines {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .line {
            position: absolute;
            width: 100%;
            height: 2px;
        }

        .top {
            top: 50px;
            background: var(--line-sub);
        }

        .middle {
            top: 110px;
            border-top: 1px dashed var(--line-main);
        }

        .bottom {
            top: 170px;
            background: var(--line-main);
        }

        .descender {
            top: 220px;
            background: var(--line-sub);
        }

        svg {
            height: 250px;
            z-index: 2;
            position: relative;
        }

        path {
            stroke: #2c3e50;
            stroke-width: 4;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* 交互按钮 */
        .btn-replay {
            margin-top: 10px;
            padding: 6px 16px;
            font-size: 13px;
            background: #fff;
            color: var(--btn-bg);
            border: 1px solid var(--btn-bg);
            border-radius: 20px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-replay:hover {
            background: var(--btn-bg);
            color: white;
        }

        .main-btn {
            padding: 12px 40px;
            background: var(--btn-bg);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 18px;
        }
    </style>
</head>

<body>

    <div class="controls">
        <textarea id="wordInput">Hello World!</textarea>
        <div class="config-row">
            <div class="speed-box">
                书写速度 (慢 ←→ 快)：
                <input type="range" id="speedRange" min="50" max="800" value="500">
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="main-btn" onclick="renderContent()">生成互动单词卡</button>
                <button class="main-btn" style="background: #27ae60;" onclick="printHandwriting()">打印字帖</button>
            </div>
        </div>
    </div>

    <div id="display-container"></div>

    <script>
        // 使用你提供并校对过的最新坐标数据
        const LetterPaths = {
            // === 大写字母 (Capitals) ===
            'A': { width: 90, paths: ["M45 50 L10 170", "M45 50 L80 170", "M25 110 L65 110"] },
            'B': { width: 80, paths: ["M25 50 L25 170", "M25 50 Q75 50, 75 85 Q75 110, 25 110", "M25 110 Q85 110, 85 140 Q85 170, 25 170"] },
            'C': { width: 85, paths: ["M75 80 C 75 50, 15 50, 15 110 C 15 170, 75 170, 75 140"] },
            'D': { width: 85, paths: ["M25 50 L25 170", "M25 50 Q85 50, 85 110 Q85 170, 25 170"] },
            'E': { width: 75, paths: ["M70 50 L25 50 L25 170 L70 170", "M25 110 L60 110"] },
            'F': { width: 70, paths: ["M70 50 L25 50 L25 170", "M25 110 L60 110"] },
            'G': { width: 85, paths: ["M75 80 Q75 50, 45 50 Q15 50, 15 110 Q15 170, 45 170 Q75 170, 75 115", "M55 115 L75 115 L75 170"] },
            'H': { width: 85, paths: ["M25 50 L25 170", "M25 110 L75 110", "M75 50 L75 170"] }, // 已修正笔顺
            'I': { width: 45, paths: ["M22 50 L22 170", "M5 50 L40 50", "M5 170 L40 170"] },
            'J': { width: 60, paths: ["M10 50 L55 50", "M35 50 L35 145 Q35 170, 10 170"] },
            'K': { width: 80, paths: ["M25 50 L25 170", "M70 50 L25 110 L75 170"] },
            'L': { width: 70, paths: ["M25 50 L25 170 L70 170"] },
            'M': { width: 100, paths: ["M15 170 L15 50 L50 130 L85 50 L85 170"] },
            'N': { width: 85, paths: ["M20 170 L20 50 L75 170 L75 50"] },
            'O': { width: 85, paths: ["M47 50 Q15 50, 15 110 Q15 170, 47 170 Q82 170, 82 110 Q82 50, 47 50"] },
            'P': { width: 75, paths: ["M25 170 L25 50 Q75 50, 75 95 Q75 125, 25 125"] },
            'Q': { width: 85, paths: ["M47 50 Q15 50, 15 110 Q15 170, 47 170 Q82 170, 82 110 Q82 50, 47 50", "M60 145 L85 180"] },
            'R': { width: 80, paths: ["M25 170 L25 50 Q75 50, 75 95 Q75 120, 25 120 L75 170"] },
            'S': { width: 80, paths: ["M65 75 C 65 45, 15 45, 15 85 C 15 120, 75 100, 75 140 C 75 180, 15 180, 15 155"] },
            'T': { width: 80, paths: ["M10 50 L70 50", "M40 50 L40 170"] },
            'U': { width: 85, paths: ["M20 50 L20 140 Q20 170, 47 170 Q75 170, 75 140 L75 50"] },
            'V': { width: 85, paths: ["M15 50 L47 170 L80 50"] },
            'W': { width: 110, paths: ["M15 50 L30 170 L52 100 L75 170 L95 50"] },
            'X': { width: 80, paths: ["M15 50 L75 170", "M75 50 L15 170"] },
            'Y': { width: 80, paths: ["M15 50 L45 110 L75 50", "M45 110 L45 170"] },
            'Z': { width: 80, paths: ["M15 50 L75 50 L15 170 L75 170"] },

            // === 小写字母 ===
            'a': { width: 75, paths: ["M60 120 C 60 110, 15 110, 15 140 C 15 170, 60 170, 60 140", "M60 110 L60 160 Q 60 172, 75 168"] },
            'b': { width: 65, paths: ["M20 50 L20 170", "M20 110 Q 65 110, 65 140 Q 65 170, 20 170"] },
            'c': { width: 65, paths: ["M60 125 C 60 110, 15 110, 15 140 C 15 170, 60 170, 60 155"] },
            'd': { width: 65, paths: ["M60 50 L60 170", "M60 110 Q 20 110, 20 140 Q 20 170, 60 170"] },
            'e': { width: 65, paths: ["M15 145 L60 145 Q 60 110, 35 110 Q 15 110, 15 140 Q 15 170, 40 170 Q 60 170, 60 160"] },
            'f': { width: 50, paths: ["M40 60 Q 40 50, 25 50 Q 15 50, 15 170", "M5 110 L35 110"] },
            'g': { width: 75, paths: ["M50 140 Q50 110, 32 110 Q15 110, 15 140 Q15 170, 32 170 Q50 170, 50 140", "M50 110 L50 190 Q50 220, 30 220 Q10 220, 10 190"] },
            'h': { width: 70, paths: ["M20 50 L20 170", "M20 140 Q 20 110, 45 110 Q 65 110, 65 140 L65 170"] },
            'i': { width: 35, paths: ["M17 110 L17 170", "M17 80 L17 85"] },
            'j': { width: 40, paths: ["M25 110 L25 210 Q 25 225, 5 225", "M25 80 L25 85"] },
            'k': { width: 70, paths: ["M20 50 L20 170", "M65 110 L25 140 L65 170"] },
            'l': { width: 35, paths: ["M17 50 L17 170"] },
            'm': { width: 105, paths: ["M20 110 L20 170", "M20 135 Q 20 110, 42 110 Q 60 110, 60 140 L60 170", "M60 135 Q 60 110, 82 110 Q 100 110, 100 140 L100 170"] },
            'n': { width: 70, paths: ["M20 110 L20 170", "M20 135 Q 20 110, 45 110 Q 65 110, 65 140 L65 170"] },
            'o': { width: 70, paths: ["M40 110 C 10 110, 10 170, 40 170 C 70 170, 70 110, 40 110"] },
            'p': { width: 70, paths: ["M20 110 L20 220", "M20 110 Q 65 110, 65 140 Q 65 170, 20 170"] },
            'q': { width: 75, paths: ["M55 120 C 55 110, 10 110, 10 140 C 10 170, 55 170, 55 140", "M55 110 L55 220"] },
            'r': { width: 55, paths: ["M20 110 L20 170", "M20 135 Q 25 110, 50 110"] },
            's': { width: 55, paths: ["M50 125 C 50 110, 15 110, 15 135 C 15 150, 50 130, 50 145 C 50 170, 15 170, 15 155"] },
            't': { width: 55, paths: ["M25 70 L25 160 Q 25 172, 40 168", "M10 110 L40 110"] },
            'u': { width: 75, paths: ["M20 110 L20 155 Q 20 170, 45 170 Q 65 170, 65 155 L65 110", "M65 110 L65 170"] },
            'v': { width: 70, paths: ["M15 110 L35 170 L55 110"] },
            'w': { width: 100, paths: ["M15 110 L28 170 L45 130 L62 170 L85 110"] },
            'x': { width: 65, paths: ["M15 110 L55 170", "M55 110 L15 170"] },
            'y': { width: 70, paths: ["M15 110 L35 170", "M55 110 L15 220"] }, // 修正为两笔式
            'z': { width: 65, paths: ["M15 110 L55 110 L15 170 L55 170"] },
            ' ': { width: 40, paths: [] },
            // === 常用标点符号 (Punctuation) ===
            '.': { width: 30, paths: ["M12 165 L12 170"] },
            ',': { width: 30, paths: ["M12 165 L12 170 Q12 185, 5 190"] },
            '!': { width: 30, paths: ["M15 50 L15 150", "M15 165 L15 170"] },
            '?': { width: 50, paths: ["M15 75 Q15 50, 30 50 Q45 50, 45 75 Q45 100, 25 115 L25 150", "M25 165 L25 170"] },
            ';': { width: 30, paths: ["M12 135 L12 140", "M12 165 L12 170 Q12 185, 5 190"] },
            ':': { width: 30, paths: ["M15 115 L15 120", "M15 165 L15 170"] },
            '"': { width: 40, paths: ["M12 110 L12 120", "M28 110 L28 120"] },
            "'": { width: 20, paths: ["M10 110 L10 120"] },
            '-': { width: 40, paths: ["M10 140 L30 140"] }
        };

        let vivusStore = {};

        function printHandwriting() {
            const input = document.getElementById('wordInput').value;
            if (!input.trim()) return;

            const printWin = window.open('', '_blank');

            const scale = 0.32;
            const rowMargin = 18;
            const pageWidth = 750;
            const lineHeight = 250 * scale;

            let htmlContent = `
    <html>
    <head>
        <title>最大行数字帖 - 含标点版</title>
        <style>
            @page { size: A4 portrait; margin: 1cm; }
            body { margin: 0; padding: 0; background: white; }
            .row-container { 
                position: relative; width: 100%; height: ${lineHeight}px; 
                margin-bottom: ${rowMargin}px; page-break-inside: avoid; display: block;
            }
            .guidelines { position: absolute; width: 100%; height: 100%; top:0; left:0; }
            .line { position: absolute; width: 100%; height: 1px; }
            .top { top: ${50 * scale}px; background: #ffcccc; }
            .middle { top: ${110 * scale}px; border-top: 1px dashed #aad4ff; }
            .bottom { top: ${170 * scale}px; background: #aad4ff; }
            .descender { top: ${220 * scale}px; background: #ffcccc; }
            svg { width: 100%; height: ${lineHeight}px; display: block; overflow: visible; }
            path { stroke: #000; stroke-width: 3.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
        </style>
    </head>
    <body>`;

            let currentX = 5;
            let currentLineSVG = '';

            // 不再简单用 split(' ')，而是遍历每一个字符
            for (let i = 0; i < input.length; i++) {
                const char = input[i];
                const data = LetterPaths[char] || LetterPaths[' '];

                // 自动换行检查
                if (currentX + (data.width * scale) > pageWidth) {
                    htmlContent += createRow(currentLineSVG);
                    currentLineSVG = '';
                    currentX = 5;
                }

                // 如果是换行符，强制换行
                if (char === '\\n') {
                    htmlContent += createRow(currentLineSVG);
                    currentLineSVG = '';
                    currentX = 5;
                    continue;
                }

                // 渲染字符
                let totalCharX = (currentX / scale);
                currentLineSVG += `<g transform="translate(${totalCharX}, 0)">
            ${data.paths.map(d => `<path d="${d}" />`).join('')}
        </g>`;

                currentX += data.width * scale;
            }

            // 扫尾
            if (currentLineSVG !== '' || currentX > 5) {
                htmlContent += createRow(currentLineSVG);
            }

            function createRow(svgInner) {
                return `
        <div class="row-container">
            <div class="guidelines">
                <div class="line top"></div><div class="line middle"></div>
                <div class="line bottom"></div><div class="line descender"></div>
            </div>
            <svg viewBox="0 0 ${pageWidth / scale} 250">${svgInner}</svg>
        </div>`;
            }

            htmlContent += `
        <script>
            window.onload = function() { 
                setTimeout(() => { window.print(); window.close(); }, 500);
            };
        <\/script>
    </body>
    </html>`;

            printWin.document.write(htmlContent);
            printWin.document.close();
        }

        function renderContent() {
            const container = document.getElementById('display-container');
            const input = document.getElementById('wordInput').value;
            container.innerHTML = '';
            vivusStore = {};

            // 按空格拆分单词
            const words = input.split(/\s+/);

            words.forEach((word, wordIndex) => {
                if (!word) return;

                const wrapper = document.createElement('div');
                wrapper.className = 'word-wrapper';

                // 计算单词长度
                let wordWidth = 0;
                for (let char of word) {
                    wordWidth += (LetterPaths[char] || LetterPaths[' ']).width;
                }
                wordWidth += 30; // 左右缓冲

                const paper = document.createElement('div');
                paper.className = 'paper-word';
                paper.style.width = wordWidth + 'px';
                paper.innerHTML = `
            <div class="guidelines">
                <div class="line top"></div>
                <div class="line middle"></div>
                <div class="line bottom"></div>
                <div class="line descender"></div>
            </div>
            <svg id="word-${wordIndex}" viewBox="0 0 ${wordWidth} 250"></svg>
        `;

                const svg = paper.querySelector('svg');
                let xOffset = 15;
                for (let char of word) {
                    const data = LetterPaths[char] || LetterPaths[' '];
                    const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                    data.paths.forEach(d => {
                        const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
                        p.setAttribute("d", d);
                        p.setAttribute("transform", `translate(${xOffset}, 0)`);
                        g.appendChild(p);
                    });
                    svg.appendChild(g);
                    xOffset += data.width;
                }

                const btn = document.createElement('button');
                btn.className = 'btn-replay';
                btn.innerText = `点击书写: ${word}`;
                btn.onclick = () => replayWord(wordIndex);

                wrapper.appendChild(paper);
                wrapper.appendChild(btn);
                container.appendChild(wrapper);

                // 默认播放
                replayWord(wordIndex);
            });
        }

        function replayWord(index) {
            const id = `word-${index}`;
            const speedBase = document.getElementById('speedRange').value;
            // 反转滑块逻辑：数值越小越快，数值越大越慢
            const finalDuration = 1000 - speedBase;

            if (vivusStore[id]) vivusStore[id].destroy();

            vivusStore[id] = new Vivus(id, {
                duration: finalDuration,
                type: 'oneByOne',
                start: 'autostart'
            });
        }

        window.onload = renderContent;
    </script>
</body>

</html>
