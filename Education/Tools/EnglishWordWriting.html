<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <title>Handwriting Master</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="./js/vivus.min.js"></script>
    <style>
        :root {
            --line-main: #aad4ff;
            --line-sub: #ffcccc;
            --btn-bg: #4a90e2;
        }

        body {
            background: #f8fafc;
            font-family: 'Segoe UI', Arial;
            padding: 20px;
            margin: 0;
        }

        .controls {
            max-width: 900px;
            margin: 0 auto 20px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            /* 默认多几行 */
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 18px;
            margin-bottom: 15px;
            box-sizing: border-box;

            resize: none;
            /* 禁止手动拖拽 */
            line-height: 1.6;
            overflow: hidden;
            /* 关键：隐藏滚动条 */
        }

        .config-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .speed-box {
            color: #64748b;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
        }

        .btn-lang {
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid #ddd;
            background: #fff;
            cursor: pointer;
            font-size: 13px;
        }

        .btn-lang:hover {
            background: #f1f5f9;
        }

        .main-btn {
            padding: 12px 18px;
            background: var(--btn-bg);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            white-space: nowrap;
        }

        .main-btn.secondary {
            background: #27ae60;
        }

        .main-btn.warn {
            background: #e67e22;
        }

        #display-container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px 15px;
            justify-content: center;
            max-width: 1100px;
            margin: 0 auto;
        }

        .word-wrapper {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
        }

        .paper-word {
            position: relative;
            height: 250px;
            background: white;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.03);
            overflow: hidden;
        }

        .guidelines {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .line {
            position: absolute;
            width: 100%;
            height: 2px;
        }

        .top {
            top: 50px;
            background: var(--line-sub);
        }

        .middle {
            top: 110px;
            border-top: 1px dashed var(--line-main);
        }

        .bottom {
            top: 170px;
            background: var(--line-main);
        }

        .descender {
            top: 220px;
            background: var(--line-sub);
        }

        svg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        path {
            stroke: #2c3e50;
            stroke-width: 4;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .btn-replay {
            margin-top: 10px;
            padding: 6px 16px;
            font-size: 13px;
            background: #fff;
            color: var(--btn-bg);
            border: 1px solid var(--btn-bg);
            border-radius: 20px;
            cursor: pointer;
        }

        .btn-replay:hover {
            background: var(--btn-bg);
            color: white;
        }

        .last-updated {
            font-size: 12px;
            color: #888;
            text-align: center;
            /* 居中显示 */
            margin: 20px 0 10px;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .controls {
                padding: 12px;
            }

            textarea {
                min-height: 80px;
                font-size: 16px;
            }

            .config-row {
                flex-direction: column;
                align-items: stretch;
            }

            .speed-box {
                justify-content: space-between;
            }

            .main-btn {
                width: 100%;
            }

            /* 字帖高度 */
            .paper-word {
                height: 200px;
                /* 原来 250px -> 200px */
                max-width: 100%;
                overflow-x: auto;
                /* 单词过长时允许横向滚动 */
                overflow-y: hidden;
                -webkit-overflow-scrolling: touch;
                /* iOS 更顺 */
                position: relative;
            }

            /* 关键：让 guidelines 跟着内容宽度走 */
            .paper-word .guidelines {
                width: max-content;
                min-width: 100%;
            }

            /* 线条也跟着铺满内容宽度 */
            .paper-word .line {
                width: 100%;
            }

            /* 四条线：百分比定位，适配缩放后的高度 */
            .line.top {
                top: 20%;
            }

            .line.middle {
                top: 44%;
            }

            .line.bottom {
                top: 68%;
            }

            .line.descender {
                top: 88%;
            }

            /* SVG 保持原始宽度，不被压缩 */
            .paper-word svg {
                width: auto;
                min-width: max-content;
            }

            /* 每个单词一行显示 */
            .word-wrapper {
                width: 100%;
            }

            #display-container {
                gap: 20px 10px;
            }

            input[type="range"] {
                width: 100%;
            }

            /* （可选）滚动条美化 */
            .paper-word::-webkit-scrollbar {
                height: 6px;
            }

            .paper-word::-webkit-scrollbar-thumb {
                background: #cbd5e1;
                border-radius: 4px;
            }
        }
    </style>
</head>

<body>

    <div class="controls">
        <div style="display:flex; justify-content:flex-end; gap:8px; margin-bottom:8px;">
            <button class="btn-lang" onclick="setLang('zh')">中文</button>
            <button class="btn-lang" onclick="setLang('en')">English</button>
        </div>

        <textarea id="wordInput">Apple</textarea>

        <div class="config-row">
            <div class="speed-box">
                <span id="speedText">书写速度 (慢 ←→ 快)：</span>
                <input type="range" id="speedRange" min="50" max="800" value="600" />
            </div>
            <div style="display:flex; gap:10px; flex-wrap:wrap;">
                <button class="main-btn" onclick="renderContent()" id="btnGen">生成互动单词卡</button>
                <button class="main-btn secondary" onclick="printHandwriting()" id="btnPrint1">打印字帖</button>
                <button class="main-btn warn" onclick="printWordsList()" id="btnPrint2">打印单词练习</button>
            </div>
        </div>
    </div>

    <div id="display-container"></div>

    <script>

        const ta = document.getElementById('wordInput');

        function autoResize() {
            ta.style.height = 'auto';
            ta.style.height = ta.scrollHeight + 'px';
        }

        ta.addEventListener('input', autoResize);
        window.addEventListener('load', autoResize);

        // 使用你提供并校对过的最新坐标数据
        const LetterPaths = {
            // 小写字母 (Lower Case)
            'a': { width: 60, paths: ["M45 115 Q15 115, 15 142 Q15 170, 31 170 Q48 170, 48 140", "M48 110 L48 170"] },
            'b': { width: 60, paths: ["M15 50 L15 170", "M15 140 Q15 110, 31 110 Q48 110, 48 140 Q48 170, 31 170 Q15 170, 15 140"] },
            'c': { width: 55, paths: ["M45 125 Q45 110, 30 110 Q15 110, 15 140 Q15 170, 30 170 Q45 170, 45 155"] },
            'd': { width: 60, paths: ["M48 50 L48 170", "M48 140 Q48 110, 32 110 Q15 110, 15 140 Q15 170, 32 170 Q48 170, 48 140"] },
            'e': { width: 60, paths: ["M15 140 L48 140 Q48 110, 31 110 Q15 110, 15 140 Q15 170, 31 170 Q48 170, 48 155"] },
            'f': { width: 40, paths: ["M35 60 Q35 50, 25 50 Q15 50, 15 65 L15 170", "M5 110 L30 110"] },
            'g': { width: 60, paths: ["M48 140 Q48 110, 31 110 Q15 110, 15 140 Q15 170, 31 170 Q48 170, 48 140", "M48 110 L48 200 Q48 220, 25 220 L10 220"] },
            'h': { width: 60, paths: ["M15 50 L15 170", "M15 130 Q15 110, 30 110 Q45 110, 45 130 L45 170"] },
            'i': { width: 25, paths: ["M12 110 L12 170", "M12 85 L12 90"] },
            'j': { width: 30, paths: ["M20 110 L20 200 Q20 220, 5 220", "M20 85 L20 90"] },
            'k': { width: 60, paths: ["M15 50 L15 170", "M50 110 L15 140", "M15 140 L50 170"] },
            'l': { width: 25, paths: ["M12 50 L12 170"] },
            'm': { width: 90, paths: ["M15 110 L15 170", "M15 130 Q15 110, 30 110 Q45 110, 45 130 L45 170", "M45 130 Q45 110, 60 110 Q75 110, 75 130 L75 170"] },
            'n': { width: 60, paths: ["M15 110 L15 170", "M15 130 Q15 110, 30 110 Q45 110, 45 130 L45 170"] },
            'o': { width: 60, paths: ["M32 110 Q15 110, 15 140 Q15 170, 32 170 Q50 170, 50 140 Q50 110, 32 110"] },
            'p': { width: 60, paths: ["M15 110 L15 220", "M15 140 Q15 110, 31 110 Q48 110, 48 140 Q48 170, 31 170 Q15 170, 15 140"] },
            'q': { width: 60, paths: ["M45 140 Q45 110, 29 110 Q12 110, 12 140 Q12 170, 29 170 Q45 170, 45 140", "M45 110 L45 220"] },
            'r': { width: 45, paths: ["M15 110 L15 170", "M15 135 Q15 110, 35 110"] },
            's': { width: 55, paths: ["M50 125 C 50 110, 15 110, 15 135 C 15 150, 50 130, 50 145 C 50 170, 15 170, 15 155"] },
            't': { width: 45, paths: ["M20 50 L20 160 Q20 170, 35 170", "M5 110 L35 110"] },
            'u': { width: 60, paths: ["M15 110 L15 160 Q15 170, 30 170 Q45 170, 45 160 L45 110", "M45 140 L45 170"] },
            'v': { width: 55, paths: ["M15 110 L35 170", "M55 110 L35 170"] },
            'w': { width: 90, paths: ["M10 110 L25 170 L45 110 L65 170 L80 110"] },
            'x': { width: 55, paths: ["M10 110 L45 170", "M45 110 L10 170"] },
            'y': { width: 60, paths: ["M15 110 L32 170", "M50 110 L25 210 Q20 220, 10 220"] },
            'z': { width: 50, paths: ["M10 110 L45 110 L10 170 L45 170"] },

            // 大写字母 (Upper Case)
            'A': { width: 80, paths: ["M40 50 L10 170", "M40 50 L70 170", "M22 130 L58 130"] },
            'B': { width: 75, paths: ["M20 50 L20 170", "M20 50 L45 50 Q65 50, 65 80 Q65 110, 45 110 L20 110", "M20 110 L50 110 Q70 110, 70 140 Q70 170, 50 170 L20 170"] },
            'C': { width: 75, paths: ["M65 80 Q65 50, 40 50 Q15 50, 15 110 Q15 170, 40 170 Q65 170, 65 140"] },
            'D': { width: 80, paths: ["M20 50 L20 170", "M20 50 Q75 50, 75 110 Q75 170, 20 170"] },
            'E': { width: 70, paths: ["M20 50 L20 170", "M20 50 L60 50", "M20 110 L50 110", "M20 170 L60 170"] },
            'F': { width: 65, paths: ["M20 50 L20 170", "M20 50 L60 50", "M20 110 L50 110"] },
            'G': { width: 85, paths: ["M75 80 Q75 50, 45 50 Q15 50, 15 110 Q15 170, 45 170 Q75 170, 75 115", "M55 115 L75 115 L75 170"] },
            'H': { width: 80, paths: ["M20 50 L20 170", "M20 110 L60 110", "M60 50 L60 170"] },
            'I': { width: 40, paths: ["M5 50 L35 50", "M20 50 L20 170", "M5 170 L35 170"] },
            'J': { width: 55, paths: ["M20 50 L60 50", "M40 50 L40 150 Q40 170, 20 170 Q5 170, 5 150"] },
            'K': { width: 80, paths: ["M20 50 L20 170", "M65 50 L20 110 L65 170"] },
            'L': { width: 65, paths: ["M20 50 L20 170", "M20 170 L60 170"] },
            'M': { width: 90, paths: ["M15 170 L15 50 L45 120 L75 50 L75 170"] },
            'N': { width: 75, paths: ["M15 170 L15 50 L60 170 L60 50"] },
            'O': { width: 85, paths: ["M42 50 Q15 50, 15 110 Q15 170, 42 170 Q70 170, 70 110 Q70 50, 42 50"] },
            'P': { width: 70, paths: ["M20 50 L20 170", "M20 50 L45 50 Q65 50, 65 80 Q65 110, 45 110 L20 110"] },
            'Q': { width: 85, paths: ["M42 50 Q15 50, 15 110 Q15 170, 42 170 Q70 170, 70 110 Q70 50, 42 50", "M55 145 L75 175"] },
            'R': { width: 75, paths: ["M20 50 L20 170", "M20 50 L45 50 Q65 50, 65 80 Q65 110, 45 110 L20 110", "M40 110 L65 170"] },
            'S': { width: 80, paths: ["M65 75 C 65 45, 15 45, 15 85 C 15 120, 75 100, 75 140 C 75 180, 15 180, 15 155"] },
            'T': { width: 70, paths: ["M10 50 L60 50", "M35 50 L35 170"] },
            'U': { width: 80, paths: ["M20 50 L20 150 Q20 170, 40 170 Q60 170, 60 150 L60 50"] },
            'V': { width: 80, paths: ["M15 50 L42 170", "M70 50 L42 170"] },
            'W': { width: 110, paths: ["M10 50 L25 170 L55 70 L85 170 L100 50"] },
            'X': { width: 80, paths: ["M15 50 L65 170", "M65 50 L15 170"] },
            'Y': { width: 80, paths: ["M15 50 L40 110", "M65 50 L40 110", "M40 110 L40 170"] },
            'Z': { width: 70, paths: ["M15 50 L65 50 L15 170 L65 170"] },

            // 标点符号 (Punctuation)
            '.': { width: 30, paths: ["M12 165 L12 170"] },
            ',': { width: 25, paths: ["M15 165 Q15 180, 10 195"] },
            '!': { width: 30, paths: ["M15 50 L15 150", "M15 165 L15 170"] },
            '?': { width: 50, paths: ["M15 75 Q15 50, 30 50 Q45 50, 45 75 Q45 100, 25 115 L25 150", "M25 165 L25 170"] },
            ';': { width: 30, paths: ["M12 135 L12 140", "M12 165 Q12 180, 7 190"] },
            ':': { width: 30, paths: ["M15 135 L15 140", "M15 165 L15 170"] },
            '"': { width: 45, paths: ["M15 55 L15 75", "M30 55 L30 75"] },
            "'": { width: 20, paths: ["M10 55 L10 75"] },
            '-': { width: 40, paths: ["M10 140 L30 140"] },
            ' ': { width: 50, paths: [] }
        };

        let vivusStore = {};

        function printHandwriting() {
            const input = document.getElementById('wordInput').value;
            if (!input.trim()) return;

            const printWin = window.open('', '_blank');

            // 配置参数
            const scale = 0.32;
            const rowMargin = 18;     // 极致压缩行间距以容纳更多行
            const pageWidth = 750;    // 宽度适配 A4
            const lineHeight = 250 * scale;
            const letterSpacing = 6;  // 字母之间的微小呼吸感

            let htmlContent = `
    <html>
    <head>
        <title>Manuscript Handwriting Practice</title>
        <style>
            @page { 
                size: A4 portrait; 
                margin: 1cm; 
            }
            body { 
                margin: 0; padding: 0; 
                background: white !important; 
            }
            .row-container { 
                position: relative; 
                width: 100%; 
                height: ${lineHeight}px; 
                margin-bottom: ${rowMargin}px;
                page-break-inside: avoid;
                display: block;
            }
            .guidelines { position: absolute; width: 100%; height: 100%; top:0; left:0; pointer-events: none; }
            .line { position: absolute; width: 100%; height: 1px; }
            /* 颜色参考字帖：淡粉色顶线和淡蓝色基线 */
            .top { top: ${50 * scale}px; background: #ffcccc; }
            .middle { top: ${110 * scale}px; border-top: 1px dashed #aad4ff; }
            .bottom { top: ${170 * scale}px; background: #aad4ff; height: 1.2px; }
            .descender { top: ${220 * scale}px; background: #ffcccc; }
            
            svg { width: 100%; height: ${lineHeight}px; display: block; overflow: visible; }
            path { stroke: #000; stroke-width: 3.2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
        </style>
    </head>
    <body>`;

            let currentX = 5;
            let currentLineSVG = '';

            // 逐字符处理以支持标点和换行
            for (let i = 0; i < input.length; i++) {
                const char = input[i];

                // 处理换行符
                if (char === '\n') {
                    htmlContent += createRow(currentLineSVG);
                    currentLineSVG = '';
                    currentX = 5;
                    continue;
                }

                const data = LetterPaths[char] || LetterPaths[' '];

                // 自动换行判断
                if (currentX + (data.width * scale) > pageWidth) {
                    htmlContent += createRow(currentLineSVG);
                    currentLineSVG = '';
                    currentX = 5;
                }

                // 渲染字符 SVG
                let totalCharX = (currentX / scale);
                currentLineSVG += `<g transform="translate(${totalCharX}, 0)">
            ${data.paths.map(d => `<path d="${d}" />`).join('')}
        </g>`;

                // 增加字符间距
                currentX += (data.width + letterSpacing) * scale;
            }

            // 处理最后一行内容
            if (currentLineSVG !== '' || currentX > 5) {
                htmlContent += createRow(currentLineSVG);
            }

            function createRow(svgInner) {
                return `
        <div class="row-container">
            <div class="guidelines">
                <div class="line top"></div><div class="line middle"></div>
                <div class="line bottom"></div><div class="line descender"></div>
            </div>
            <svg viewBox="0 0 ${pageWidth / scale} 250">${svgInner}</svg>
        </div>`;
            }

            htmlContent += `
        <script>
            window.onload = function() { 
                setTimeout(() => { window.print(); window.close(); }, 500);
            };
        <\/script>
    </body>
    </html>`;

            printWin.document.write(htmlContent);
            printWin.document.close();
        }

        function printWordsList() {
            const input = document.getElementById('wordInput').value;
            if (!input.trim()) return;

            const printWin = window.open('', '_blank');

            // 物理参数：为了 10 行能撑满 A4 纸，每行物理高度设定为约 108px
            const rowHeight = 108;
            const pageWidth = 750;    // A4 宽度点数
            const letterSpacing = 6;

            // 提取并去重单词
            const words = [...new Set(input.split(/[\s,，.。"”\n]+/).filter(w => w.length > 0))];

            let htmlContent = `
    <html>
    <head>
        <title>单词临摹练字帖</title>
        <style>
            @page { size: A4 portrait; margin: 0.5cm 1cm; }
            body { margin: 0; padding: 0; background: white !important; -webkit-print-color-adjust: exact; }
            
            .row-container { 
                position: relative; 
                width: 100%; 
                height: ${rowHeight}px; 
                margin-bottom: 5px;
                page-break-inside: avoid; 
                display: block;
                box-sizing: border-box;
            }

            /* 辅助线：严格按照 50-110-170-220 的比例计算百分比 */
            .guidelines { position: absolute; width: 100%; height: 100%; top:0; left:0; }
            .line { position: absolute; width: 100%; height: 1.2px; }
            .top { top: 20%; background: #ffcccc; }           /* 50/250 */
            .middle { top: 44%; border-top: 1.2px dashed #aad4ff; } /* 110/250 */
            .bottom { top: 68%; background: #aad4ff; height: 1.8px; } /* 170/250 */
            .descender { top: 88%; background: #ffcccc; }      /* 220/250 */
            
            svg { 
                width: 100%; 
                height: 100%; 
                display: block; 
                overflow: visible;
            }
            .model-word { stroke: #000; stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
            .practice-word { stroke: #e5e5e5 !important; stroke-width: 3.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
        </style>
    </head>
    <body>`;

            words.forEach((word) => {
                htmlContent += createWordPracticeRow(word, pageWidth, letterSpacing);
            });

            htmlContent += `
        <script>
            window.onload = function() { 
                setTimeout(() => { window.print(); window.close(); }, 500);
            };
        <\/script>
    </body>
    </html>`;

            printWin.document.write(htmlContent);
            printWin.document.close();
        }

        function createWordPracticeRow(word, pageWidth, letterSpacing) {
            let wordSvgContent = '';

            // 计算单词原始逻辑宽度
            let singleWordWidth = 0;
            for (let char of word) {
                singleWordWidth += (LetterPaths[char] || LetterPaths[' ']).width + letterSpacing;
            }

            // 1. 绘制范字：不再在外部套 scale，而是让 viewBox 自动撑满
            // 我们在左侧预留一小段空白 (x=40)
            wordSvgContent += `<g class="model-word" transform="translate(40, 0)">`;
            wordSvgContent += generateWordPaths(word, letterSpacing);
            wordSvgContent += `</g>`;

            // 2. 绘制 3 个练习位
            // 逻辑坐标系下的间距计算：将 A4 宽度还原回 250 坐标系对应的宽度
            // A4 约 750px，rowHeight 约 108px，比例约为 7:1。
            // 所以 viewBox 的宽度大约是 250 * 7 = 1750 左右。
            const logicPageWidth = (pageWidth / 108) * 250;
            const step = Math.max(singleWordWidth + 100, logicPageWidth / 4);

            for (let i = 1; i <= 3; i++) {
                let xPos = 40 + (i * step);
                if (xPos + singleWordWidth > logicPageWidth - 20) break;

                wordSvgContent += `<g class="practice-word" transform="translate(${xPos}, 0)">`;
                wordSvgContent += generateWordPaths(word, letterSpacing);
                wordSvgContent += `</g>`;
            }

            return `
    <div class="row-container">
        <div class="guidelines">
            <div class="line top"></div>
            <div class="line middle"></div>
            <div class="line bottom"></div>
            <div class="line descender"></div>
        </div>
        <svg viewBox="0 0 ${logicPageWidth} 250">${wordSvgContent}</svg>
    </div>`;
        }

        function generateWordPaths(word, spacing) {
            let x = 0;
            let paths = '';
            for (let char of word) {
                const data = LetterPaths[char] || LetterPaths[' '];
                if (data) {
                    paths += `<g transform="translate(${x}, 0)">
                ${data.paths.map(d => `<path d="${d}" />`).join('')}
            </g>`;
                    x += (data.width + spacing);
                }
            }
            return paths;
        }

        function renderContent() {
            const container = document.getElementById('display-container');
            const input = document.getElementById('wordInput').value;
            container.innerHTML = '';
            vivusStore = {};

            // 按空格拆分单词
            const words = input.split(/\s+/);

            words.forEach((word, wordIndex) => {
                if (!word) return;

                const wrapper = document.createElement('div');
                wrapper.className = 'word-wrapper';

                // 计算单词长度
                let wordWidth = 0;
                for (let char of word) {
                    wordWidth += (LetterPaths[char] || LetterPaths[' ']).width;
                }
                wordWidth += 30; // 左右缓冲

                const paper = document.createElement('div');
                paper.className = 'paper-word';
                paper.style.width = wordWidth + 'px';
                paper.innerHTML = `
            <div class="guidelines">
                <div class="line top"></div>
                <div class="line middle"></div>
                <div class="line bottom"></div>
                <div class="line descender"></div>
            </div>
            <svg id="word-${wordIndex}" viewBox="0 0 ${wordWidth} 250"></svg>
        `;

                const svg = paper.querySelector('svg');
                let xOffset = 15;
                for (let char of word) {
                    const data = LetterPaths[char] || LetterPaths[' '];
                    const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                    data.paths.forEach(d => {
                        const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
                        p.setAttribute("d", d);
                        p.setAttribute("transform", `translate(${xOffset}, 0)`);
                        g.appendChild(p);
                    });
                    svg.appendChild(g);
                    xOffset += data.width;
                }

                const btn = document.createElement('button');
                btn.className = 'btn-replay';
                btn.dataset.word = word;
                btn.innerText = `${i18n[currentLang].replay}: ${word}`;
                btn.onclick = () => replayWord(wordIndex);

                wrapper.appendChild(paper);
                wrapper.appendChild(btn);
                container.appendChild(wrapper);

                // 默认播放
                replayWord(wordIndex);
            });
        }

        function replayWord(index) {
            const id = `word-${index}`;
            const speedBase = document.getElementById('speedRange').value;
            // 反转滑块逻辑：数值越小越快，数值越大越慢
            const finalDuration = 1000 - speedBase;

            if (vivusStore[id]) vivusStore[id].destroy();

            vivusStore[id] = new Vivus(id, {
                duration: finalDuration,
                type: 'oneByOne',
                start: 'autostart'
            });
        }

        // window.onload = renderContent;
    </script>

    <script>
        let currentLang = 'zh';
        const i18n = {
            zh: {
                title: "英文点读互动书写板",
                speed: "书写速度 (慢 ←→ 快)：",
                gen: "生成互动单词卡",
                print1: "打印字帖",
                print2: "打印单词练习",
                replay: "点击书写"
            },
            en: {
                title: "English Handwriting Board",
                speed: "Writing Speed (Slow ←→ Fast):",
                gen: "Generate Cards",
                print1: "Print Handwriting Sheet",
                print2: "Print Word Practice",
                replay: "Replay"
            }
        };

        function setLang(lang) {
            currentLang = lang;
            document.title = i18n[lang].title;
            document.getElementById('speedText').innerText = i18n[lang].speed;
            document.getElementById('btnGen').innerText = i18n[lang].gen;
            document.getElementById('btnPrint1').innerText = i18n[lang].print1;
            document.getElementById('btnPrint2').innerText = i18n[lang].print2;

            document.querySelectorAll('.btn-replay').forEach(btn => {
                const word = btn.dataset.word;
                btn.innerText = `${i18n[currentLang].replay}: ${word}`;
            });
        }

        const userLang = navigator.language.includes('zh') ? 'zh' : 'en';

        window.onload = function () {
            setLang(userLang);
            renderContent();
        };
    </script>
