<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title id="maintitle">加载中...</title>
    <style>
      :root {
        --header-green: #92d050;
        --header-purple: #7030a0;
        --btn-green: #5cb85c;
        --btn-green-hover: #4cae4c;
        --border-color: #92d050;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        font-family: "Microsoft YaHei", sans-serif;
        background-color: #f0f2f5;
        padding-top: 10px;
        height: 100%; /* 使用 100% 而非 100vh */
        width: 100%;
        overflow: hidden;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center; /* 居中显示卡片 */
      }

      /* --- 修改点 2: 容器高度改为 100% 内部自适应 --- */
      .slide-container {
        width: 98vw;
        height: 98%; /* 留一点点边距，确保 Footer 永远在视口内 */
        background-color: white;
        display: flex;
        flex-direction: column;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        border-radius: 4px;
        overflow: hidden;
      }

      /* Header */
      header {
        display: flex;
        height: 60px;
        color: white;
        font-size: 22px;
        font-weight: bold;
        flex-shrink: 0;
      }

      .header-left {
        background-color: var(--header-green);
        flex: 5;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 0 10px;
      }

      .header-right {
        background-color: var(--header-purple);
        flex: 1.2;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 18px;
        transition: background-color 0.3s;
        /* 平滑颜色切换 */
      }

      /* 内容区域 */
      .content {
        flex: 1;
        padding: 20px 30px;
        overflow-y: auto;
        display: flex;
        -webkit-overflow-scrolling: touch; /* 优化 iOS/平板滚动流畅度 */
        flex-direction: column;
        gap: 10px;
        background-color: #fff;
        scroll-behavior: smooth;
      }

      .box-original {
        border: 2px solid var(--border-color);
        padding: 10px;
        font-size: 1.25rem;
        line-height: 1.7;
        background-color: #fafdfa;
        flex-shrink: 0;
      }

      .box-explanation {
        border: 2px dashed var(--border-color);
        padding: 10px;
        font-family: "Kaiti", "STKaiti", "楷体", "楷体_GB2312", serif;
        font-size: 1.6rem;
        line-height: 1.8;
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        white-space: pre-wrap;
      }

      .label-check {
        color: #2e7d32;
        font-weight: bold;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      /* 封面模式 */
      .chapter-cover {
        display: none;
        height: 100%;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
      }

      .chapter-cover h1 {
        font-size: clamp(40px, 8vw, 80px);
        margin: 0;
        font-family: "Kaiti", "STKaiti", serif;
        font-weight: normal;
        letter-spacing: 10px;
      }

      .chapter-cover h2 {
        font-size: 24px;
        margin-top: 20px;
        color: #666;
        font-weight: normal;
      }

      [class^="hl"] {
        padding: 0 4px;
        /* 稍微增加了一点侧边间距，呼吸感更好 */
        border-radius: 3px;
        /* 稍微圆润一点，更现代 */
        display: inline;
        /* 确保不会断行 */
      }

      /* 特性样式：只负责颜色 */
      .hl1 {
        color: red;
        background-color: yellow;
        font-weight: bold;
      }

      /* 红字黄底 */
      .hl2 {
        color: red;
        font-weight: bold;
      }

      /* 仅红字 */
      .hl3 {
        background-color: yellow;
      }

      /* 仅黄底 */

      /* Footer */
      footer {
        height: 60px;
        padding: 0 30px;
        border-top: 1px solid #eee;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: relative;
        background: #fff;
        flex-shrink: 0;
      }

      .btn-nav {
        background-color: var(--btn-green);
        color: white;
        border: none;
        padding: 10px 18px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: background-color 0.2s;
      }

      .btn-nav:hover {
        background-color: var(--btn-green-hover);
      }

      .page-counter-center {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        color: #666;
        font-size: 16px;
        font-family: serif;
      }

      .right-group {
        display: flex;
        align-items: center;
        gap: 15px;
      }

      .select-slide {
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
        min-width: 110px;
      }

      /* =========================================
           MOBILE 移动端适配
           ========================================= */
      @media (max-width: 600px) {
        body {
          padding-top: 5px;
          /* 手机上顶部间距更小 */
        }

        .slide-container {
          width: 98vw;
          /* 手机上尽量占满宽度 */
          height: 98vh;
          /* 手机上尽量占满高度 */
        }

        header {
          height: 50px;
          font-size: 16px;
        }

        .content {
          padding: 20px 20px;
        }

        /* 1. 隐藏中间页码计数 */
        .page-counter-center {
          display: none;
        }

        /* 2. 隐藏按钮文字 */
        .btn-nav .btn-text {
          display: none;
        }

        .btn-nav {
          padding: 12px 18px;
          z-index: 10;
        }

        /* 3. 下拉框在 Footer 居中 */
        footer {
          display: flex;
          justify-content: space-between;
          /* 按钮分居两侧 */
          height: 50px;
          padding: 0 10px;
        }

        .right-group {
          display: contents;
          /* 让子元素直接参与 footer 的 flex 布局 */
        }

        .select-slide {
          position: absolute;
          left: 50%;
          top: 50%;
          transform: translate(-50%, -50%);
          /* 完美的绝对居中 */
          min-width: 120px;
          max-width: 150px;
          font-size: 13px;
          z-index: 5;
        }
      }

      /* =========================================
            打印专用样式 (PDF 导出)
            ========================================= */
      @media print {
        /* 强制颜色显示 */
        * {
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
        }

        @page {
          size: A4 landscape;
          margin: 0;
          /* 设为0，由内容控制边距 */
        }

        /* 2. 彻底清理 body */
        html,
        body {
          margin: 0 !important;
          padding: 0 !important;
          background: white !important;
          width: 100% !important;
          height: auto !important;
          overflow: visible !important;
          display: block !important;
        }

        /* 打印时的每一页容器 */
        .print-page {
          position: relative;
          /* 为页码绝对定位做准备 */
          width: 297mm;
          height: 210mm;
          page-break-after: always;
          break-after: page;
          display: flex;
          flex-direction: column;
          background: white;
        }

        /* 页码样式 */
        .print-footer-page {
          position: absolute;
          bottom: 10mm;
          right: 15mm;
          font-size: 14px;
          color: #666;
          font-family: serif;
        }

        /* 调整打印时的字体大小，确保能放下更多内容 */
        .box-original {
          font-size: 1.1rem !important;
          padding: 15px !important;
        }

        .box-explanation {
          font-size: 1.2rem !important;
          padding: 15px !important;
          flex: 1;
        }

        /* 隐藏所有 UI */
        footer,
        .btn-nav,
        .page-counter-center,
        .select-slide,
        #mainHeader {
          display: none !important;
        }
      }
    </style>
  </head>

  <body>
    <div class="slide-container">
      <header id="mainHeader">
        <div class="header-left" id="displayTitle"></div>
        <div class="header-right" id="displayPersonContainer">
          <span id="displayPerson"></span>
        </div>
      </header>

      <main class="content" id="scrollContainer">
        <div
          id="contentMode"
          style="
            display: none;
            flex-direction: column;
            gap: 20px;
            min-height: 100%;
          "
        >
          <div class="box-original" id="displayOriginal"></div>
          <div class="box-explanation">
            <span class="label-check">✅ 消文</span>
            <div id="displayExplanation"></div>
          </div>
        </div>
        <div id="titleMode" class="chapter-cover">
          <h1 id="bigTitle"></h1>
          <h2 id="subTitle"></h2>
        </div>
      </main>

      <footer>
        <button class="btn-nav" onclick="changePage(-1)">
          <span>◀</span> <span class="btn-text">上一页</span>
        </button>

        <div class="page-counter-center">
          <span id="currentNum">1</span> of <span id="totalNum">1</span>
        </div>

        <div class="right-group">
          <select
            class="select-slide"
            id="slideSelector"
            onchange="jumpToPage()"
          ></select>
          <button class="btn-nav" onclick="changePage(1)">
            <span class="btn-text">下一页</span> <span>▶</span>
          </button>
        </div>
      </footer>
    </div>

    <script>
      let slideData = [];
      let currentIndex = 0;
      let mainDataCache = null;

      function loadScript(fileName) {
        return new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = fileName;
          script.type = "text/javascript";
          script.onload = () => {
            if (typeof mainData !== "undefined") {
              resolve(mainData);
            } else {
              reject(new Error("No data found in the loaded script."));
            }
          };
          script.onerror = () =>
            reject(new Error(`Failed to load script: ${fileName}`));
          document.body.appendChild(script);
        });
      }

      function getScriptParam() {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get("input");
      }

      async function init() {
        try {
          const scriptFile = getScriptParam();
          if (!scriptFile) throw new Error("No JS file specified.");

          const fileName = `./data/${scriptFile}.js`;
          const mainData = await loadScript(fileName);
          mainDataCache = mainData; // 存入缓存

          document.getElementById("maintitle").innerHTML =
            mainData.title + " " + mainData.subtitle;
          slideData = mainData.paragraph;

          document.getElementById("totalNum").innerText = slideData.length;
          const selector = document.getElementById("slideSelector");
          selector.innerHTML = "";

          slideData.forEach((item, index) => {
            let opt = document.createElement("option");
            opt.value = index;

            if (item.category === "title") {
              opt.innerHTML = `${index + 1}: [${item.mainTitle}]`;
            } else {
              // 包含标题与负责人的下拉索引
              const name =
                item.personInCharge && item.personInCharge.trim() !== ""
                  ? ` ${item.personInCharge}`
                  : "";
              opt.innerHTML = `${index + 1}: ${item.pageTitle} - ${name}`;
            }
            selector.appendChild(opt);
          });
          renderSlide();
        } catch (error) {
          console.error("Initialization error:", error);
        }
      }

      function renderSlide() {
        if (!slideData || slideData.length === 0) return;

        const data = slideData[currentIndex];
        const header = document.getElementById("mainHeader");
        const personContainer = document.getElementById(
          "displayPersonContainer",
        );
        const personText = document.getElementById("displayPerson");
        const contentMode = document.getElementById("contentMode");
        const titleMode = document.getElementById("titleMode");
        const originalBox = document.getElementById("displayOriginal");
        const scrollContainer = document.getElementById("scrollContainer");

        scrollContainer.scrollTop = 0;

        if (data.category === "title") {
          contentMode.style.display = "none";
          titleMode.style.display = "flex";
          header.style.visibility = "hidden";
          document.getElementById("bigTitle").innerText = data.mainTitle;
          document.getElementById("subTitle").innerText =
            (data.subTitle || "") +
            "\n" +
            (mainDataCache ? mainDataCache.title : "");
        } else {
          contentMode.style.display = "flex";
          titleMode.style.display = "none";
          header.style.visibility = "visible";
          document.getElementById("displayTitle").innerText =
            data.pageTitle || "";

          // 负责人逻辑与背景色动态切换
          const name = data.personInCharge ? data.personInCharge.trim() : "";
          personText.innerText = name;
          personContainer.style.backgroundColor =
            name === "" ? "var(--header-green)" : "var(--header-purple)";

          // 原文显示控制
          if (!data.originalText || data.originalText.trim() === "") {
            originalBox.style.display = "none";
          } else {
            originalBox.style.display = "block";
            originalBox.innerHTML = data.originalText;
          }
          document.getElementById("displayExplanation").innerHTML =
            data.explanation;
        }

        document.getElementById("currentNum").innerText = currentIndex + 1;
        document.getElementById("slideSelector").value = currentIndex;
      }

      function changePage(delta) {
        const total = slideData.length;
        if (total === 0) return;

        currentIndex += delta;
        if (currentIndex < 0) currentIndex = total - 1;
        else if (currentIndex >= total) currentIndex = 0;

        renderSlide();
      }

      function jumpToPage() {
        currentIndex = parseInt(document.getElementById("slideSelector").value);
        renderSlide();
      }

      // 全量打印函数
      function doFullPrint() {
        const originalBody = document.body.innerHTML;
        const totalPages = slideData.length;

        // 使用数组 push 最后 join('')，比 += 字符串拼接更干净，不容易产生多余空行
        let htmlArray = [];

        slideData.forEach((item, index) => {
          const isTitle = item.category === "title";
          const person = item.personInCharge ? item.personInCharge.trim() : "";
          const personBg =
            person === "" ? "var(--header-green)" : "var(--header-purple)";
          const currentPage = index + 1;

          const textLength =
            (item.explanation || "").length + (item.originalText || "").length;
          let dynamicFontSize = "1.4rem"; // 默认字号

          //if (textLength > 600) dynamicFontSize = "0.9rem"; // 字多，缩小
          //if (textLength > 1000) dynamicFontSize = "0.7rem"; // 字非常多，大幅缩小

          // 注意：模板字符串紧贴左侧，防止产生多余空白节点
          htmlArray.push(`<div class="print-page">
            <header style="display: flex; height: 60px; color: white; visibility: ${isTitle ? "hidden" : "visible"}">
                <div style="background-color: var(--header-green); flex: 5; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 20px;">
                    ${item.pageTitle || ""}
                </div>
                <div style="background-color: ${personBg}; flex: 1.2; display: flex; justify-content: center; align-items: center; font-size: 16px;">
                    ${person}
                </div>
            </header>
            
            
            <div style="flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 15px;">
                ${
                  isTitle
                    ? `
                    <div style="height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;">
                        <h1 style="font-size: 60px; font-family: 'Kaiti', serif; margin: 0;">${item.mainTitle}</h1>
                        <h2 style="font-size: 24px; color: #666; font-weight: normal; margin-top: 20px;">${(item.subTitle || "") + "<br>" + (mainDataCache ? mainDataCache.title : "")}</h2>
                    </div>
                `
                    : `
                    <div class="box-original" style="display: ${!item.originalText ? "none" : "block"}">
                        ${item.originalText || ""}
                    </div>
                    <div class="box-explanation" style="font-family: 'Kaiti', 'STKaiti', serif; line-height: 1.6;">
                        <span class="label-check">✅ 消文</span>
                        <div style="margin-top: 10px;">${item.explanation}</div>
                    </div>
                `
                }
            </div>
            <div class="print-footer-page">Page ${currentPage} of ${totalPages}</div>
        </div>`);
        });

        // 替换 body
        document.body.innerHTML = htmlArray.join("");

        setTimeout(() => {
          window.print();
          document.body.innerHTML = originalBody;
          window.location.reload();
        }, 500);
      }

      // 键盘翻页监听
      document.addEventListener("keydown", (e) => {
        if (document.activeElement.tagName === "SELECT") return;

        // 拦截 Ctrl + P (Mac 上是 Command + P)
        if ((e.ctrlKey || e.metaKey) && e.key === "p") {
          e.preventDefault();
          doFullPrint();
        }
        if (e.key === "ArrowLeft") {
          changePage(-1);
        } else if (e.key === "ArrowRight") {
          changePage(1);
        }
      });

      window.addEventListener("load", init);
    </script>
  </body>
</html>
