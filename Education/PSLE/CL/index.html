  <style>
    :root {
      --ink:       #1a1208;
      --ink-mid:   #4a3c28;
      --ink-light: #8a7a62;
      --paper:     #f5f0e8;
      --gold:      #b8912a;
      --gold-dim:  rgba(184,145,42,.12);
      --border:    rgba(184,145,42,.28);
      --shadow:    rgba(80,60,20,.12);
      --radius:    10px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Noto Serif SC", "Book Antiqua", "Palatino Linotype", Georgia, serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
    }
    .wrap { max-width: 860px; margin: 0 auto; padding: 40px 24px 64px; }
    .logo { text-align: center; margin-bottom: 36px; }
    .logo h1 { font-size: 1.9rem; font-weight: 700; letter-spacing: .12em; color: var(--ink); }
    .empty {
      text-align: center; padding: 48px 24px;
      color: var(--ink-light); font-size: 0.9rem; font-family: system-ui, sans-serif;
      border: 1px dashed var(--border); border-radius: var(--radius); background: #fff;
    }
    .update-date {
      text-align: center; margin-top: 48px; font-size: 0.78rem;
      color: var(--ink-light); font-family: system-ui, sans-serif;
    }
    @media (max-width: 480px) {
      .wrap { padding: 28px 16px 48px; }
      .logo h1 { font-size: 1.45rem; }
    }
  </style>
</head>

    <header class="logo">
