const practices = [

    passage: `Zack finally completed his homework and stealthily crept to the kitchen to spy on his mother. Much to his delight, she was busy preparing dinner. He assumed she would not notice him switching on the computer.

"Zack, you've been staring at the screen for more than an hour. Switch off the computer right now," Zack's mother demanded sharply.

Zack felt a pang of remorse and apologised immediately, adding in a small voice, "I should have asked for your permission first."

Zack's mother shook her head and sighed in exasperation. She sternly reminded him that he should not have disregarded her rule about screen time either.`
  },
  {
    title: "Practice 4",
    topic: "Screen Time at Home",
    photo: "A boy wearing headphones at a computer while an adult stands nearby with arms crossed.",
    prompts: [
      "The photograph shows a familiar scene in some homes. How do you think the person standing beside the boy in the photograph is feeling? Why?",
      "Do you enjoy using electronic devices? Why / Why not?",
      "Was there a time when you broke a rule made by your parents? Tell me about it."

    readingContext: "It is your turn to give a short presentation during a Health Education lesson. You have prepared the script below and will now read it aloud to the class.",

Although I knew Grandpa would be sad that he had to give up what he enjoyed, it was for his own good. After a little gentle persuasion, he agreed to go on a low-sugar diet. We even started taking another route home to avoid the tempting treats!`

    passage: `Good morning, everyone! The Science Club members attended the 'Water is Precious!' talk yesterday. Our teacher-in-charge, Mrs Tan, wanted me to give you some useful tips on saving water this morning.

  {
    title: "Practice 6",
    topic: "Family Watching TV",
    photo: "A family of four sitting together on a sofa, smiling while watching television.",
    prompts: [

    passage: `Dawn and her parents came across a current affairs programme some time ago. They found it informative and enjoyed watching it together.

const tips = [
  "Speak clearly and at a steady pace — not too fast, not too slow.",
  "Pause at commas and full stops to let meaning sink in.",
  "For questions in the passage, raise your pitch slightly at the end.",
  "For dialogue, change your voice slightly for each character.",
  "Stress important words — nouns, verbs, and key adjectives.",
  "Make eye contact with your 'audience' (the examiner) between sentences.",
  "Practise the difficult vocabulary words before reading the full passage.",
  "For the conversation, answer in full sentences and give reasons.",
  "Use connectives like 'because', 'therefore', 'however' to extend your answers.",
  "Prepare a personal example for each topic — it makes answers more convincing."
];

let active = 0;

function renderTabs() {
  const el = document.getElementById('tabs');
  el.innerHTML = practices.map((p, i) =>
    `<button class="tab ${i === active ? 'active' : ''}" onclick="setTab(${i})">${p.title}</button>`
  ).join('') +
    `<button class="tab ${active === 8 ? 'active' : ''}" onclick="setTab(8)">Study Tips</button>`;
}

function setTab(i) {
  ttsStop();
  active = i;
  renderTabs();
  renderContent();
}

function renderContent() {
  const el = document.getElementById('content');
  if (active === 8) {
    el.innerHTML = `
      <div class="card">
        <span class="badge badge-green">Tips for scoring well</span>
        <div class="section-title">Reading Aloud</div>
        ${tips.slice(0, 5).map(t => `<div class="prompt-item"><span class="prompt-label">•</span><span>${t}</span></div>`).join('')}
        <div class="section-title">Stimulus-Based Conversation</div>
        ${tips.slice(5).map(t => `<div class="prompt-item"><span class="prompt-label">•</span><span>${t}</span></div>`).join('')}
      </div>
      <div class="card">
        <span class="badge badge-blue">How to practise at home</span>
        <div class="rec-grid">
          <div class="rec-card"><div class="rec-icon">🎙️</div><div class="rec-title">Record &amp; replay</div><div class="rec-desc">Record yourself reading the passage, then listen back to catch mispronunciations and pacing issues.</div></div>
          <div class="rec-card"><div class="rec-icon">⏱️</div><div class="rec-title">Time yourself</div><div class="rec-desc">Aim for a natural, unhurried pace. A 200-word passage should take about 90–120 seconds.</div></div>
          <div class="rec-card"><div class="rec-icon">💬</div><div class="rec-title">Role-play the conversation</div><div class="rec-desc">A parent asks the three prompts; the child answers in 3–5 full sentences each. Take turns being the examiner.</div></div>
          <div class="rec-card"><div class="rec-icon">📝</div><div class="rec-title">Vocabulary prep</div><div class="rec-desc">Before each practice, identify 3–5 difficult words (e.g. "exasperation", "formidable") and practise saying them aloud.</div></div>
          <div class="rec-card"><div class="rec-icon">🔁</div><div class="rec-title">Spaced repetition</div><div class="rec-desc">Rotate through all 8 practices over two weeks. Return to weaker ones more often.</div></div>
          <div class="rec-card"><div class="rec-icon">⭐</div><div class="rec-title">Self-rate each attempt</div><div class="rec-desc">After each recording, score yourself: Clarity / Pace / Expression / Confidence on a 1–5 scale and track progress.</div></div>
        </div>
      </div>`;
    return;
  }
  const p = practices[active];

  // Split by paragraph (blank line) only — never split inside a paragraph.
  const chunks = p.passage.trim().split(/\n\s*\n/).map(s => s.replace(/\n/g,' ').trim()).filter(Boolean);

  const passageHTML = chunks.map((s, i) =>
    `<p class="word-chunk" id="chunk-${i}" data-plain-text="${escHtml(s)}" style="margin-bottom:0.9rem">${escHtml(s)}</p>`
  ).join('');

  el.innerHTML = `
    <div class="card">
      <span class="badge badge-blue">Stimulus-Based Conversation · 25 marks</span>
      <div class="topic-title">${p.topic}</div>
      <div class="photo-desc">${p.photo}</div>
      <div class="section-title">Prompts</div>
      ${p.prompts.map((q, i) => `<div class="prompt-item"><span class="prompt-label">(${String.fromCharCode(97 + i)})</span><span>${q}</span></div>`).join('')}
    </div>
    <div class="card">
      <span class="badge badge-green">Reading Aloud · 15 marks</span>
      <div class="reading-context">${p.readingContext}</div>

      <div class="tts-bar">
        <button class="tts-btn primary" id="tts-play-btn" onclick="ttsToggle()">
          <svg id="tts-icon" width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><polygon points="3,2 13,8 3,14"/></svg>
          <span id="tts-label">Play</span>
        </button>
        <button class="tts-btn stop-btn" id="tts-stop-btn" onclick="ttsStop()" title="Stop">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><rect x="2" y="2" width="12" height="12" rx="2"/></svg>
          Stop
        </button>
        <div class="tts-speed">
          Speed:
          <select id="tts-rate" onchange="ttsSetRate(this.value)">
            <option value="0.7">Slow</option>
            <option value="0.85">Gentle</option>
            <option value="1" selected>Normal</option>
            <option value="1.2">Fast</option>
          </select>
        </div>
        <span class="tts-status" id="tts-status">Ready</span>
      </div>

      <div class="passage" id="passage-el">${passageHTML}</div>
      <div class="tip-box">Tip: Mark up your copy — draw a slash (/) at commas, double slash (//) at full stops. Underline words to stress. Circle tricky vocabulary to practise beforehand.</div>
    </div>`;

  initTTS(chunks);
}

// ── Audio Player ─────────────────────────────────────────────
// Uses pre-recorded MP3 files (audio/p1.mp3 … audio/p8.mp3).
// Paragraph highlighting uses character-count-weighted timestamps:
// each paragraph starts highlighting at (cumChars / totalChars) × duration,
// so longer paragraphs get proportionally more time.

let ttsState        = 'idle';   // idle | playing | paused
let ttsCurrentIdx   = 0;
let ttsRate         = 1;
let audioEl         = null;
let chunkStartTimes = [];       // per-paragraph start times in seconds

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function escHtml2(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function decodeEntities(s) {
  return (s || '').replace(/&amp;/g,'&').replace(/&lt;/g,'<')
                  .replace(/&gt;/g,'>').replace(/&quot;/g,'"').trim();
}

// Compute when each paragraph should highlight, weighted by character count.
function computeChunkTimes(chunks, duration) {
  const totalChars = chunks.reduce((s, c) => s + c.length, 0) || 1;
  let cum = 0;
  chunkStartTimes = chunks.map(c => {
    const t = (cum / totalChars) * duration;
    cum += c.length;
    return t;
  });
}

function onTimeUpdate() {
  if (!chunkStartTimes.length || !audioEl) return;
  const t = audioEl.currentTime;
  let idx = 0;
  for (let i = chunkStartTimes.length - 1; i >= 0; i--) {
    if (t >= chunkStartTimes[i]) { idx = i; break; }
  }
  if (idx !== ttsCurrentIdx) {
    ttsCurrentIdx = idx;
    highlightChunk(idx);
  }
}

function onAudioEnded() {
  ttsState      = 'idle';
  ttsCurrentIdx = 0;
  setTTSBtn('idle');
}

// Paragraph start timestamps (seconds) from speech.json — works offline.
const SPEECH_TIMINGS = {
  "p1": [
    0,
    12.44
  ],
  "p2": [
    0,
    31.2,
    49.66
  ],
  "p3": [
    0,
    13.3,
    32.78,
    41.04,
    48.5
  ],
  "p4": [
    0,
    9.82,
    41.62
  ],
  "p5": [
    0,
    13.92,
    44.56
  ],
  "p6": [
    0,
    23.58,
    46.68
  ],
  "p7": [
    0,
    26.3,
    51.08
  ],
  "p8": [
    0,
    8.38,
    28.98,
    41.1,
    47.9
  ]
};

function initTTS(chunks) {
  if (audioEl) {
    audioEl.pause();
    audioEl.removeEventListener('timeupdate', onTimeUpdate);
    audioEl.removeEventListener('ended', onAudioEnded);
    audioEl.src = '';
  }
  chunkStartTimes = [];
  ttsState        = 'idle';
  ttsCurrentIdx   = 0;
  setTTSBtn('idle');

  const key = 'p' + (active + 1);
  const src = 'audio/' + key + '.mp3';
  audioEl = new Audio(src);
  audioEl.preload = 'metadata';

  audioEl.addEventListener('loadedmetadata', () => {
    const saved = SPEECH_TIMINGS[key];
    if (saved && saved.length === chunks.length) {
      chunkStartTimes = saved;
    } else {
      // Fallback: weight by character count if timestamps don't match paragraph count
      computeChunkTimes(chunks.map(decodeEntities).filter(Boolean), audioEl.duration);
    }
  });
  audioEl.addEventListener('timeupdate', onTimeUpdate);
  audioEl.addEventListener('ended', onAudioEnded);
}

function ttsSetRate(val) {
  ttsRate = parseFloat(val);
  if (audioEl) audioEl.playbackRate = ttsRate;
}

function setTTSBtn(state) {
  const btn    = document.getElementById('tts-play-btn');
  const icon   = document.getElementById('tts-icon');
  const label  = document.getElementById('tts-label');
  const status = document.getElementById('tts-status');
  if (!btn) return;
  if (state === 'playing') {
    icon.innerHTML = '<rect x="2" y="2" width="4" height="12" rx="1"/><rect x="10" y="2" width="4" height="12" rx="1"/>';
    label.textContent  = 'Pause';
    status.textContent = 'Playing…';
  } else if (state === 'paused') {
    icon.innerHTML = '<polygon points="3,2 13,8 3,14"/>';
    label.textContent  = 'Resume';
    status.textContent = 'Paused';
  } else {
    icon.innerHTML = '<polygon points="3,2 13,8 3,14"/>';
    label.textContent  = 'Play';
    status.textContent = 'Ready';
    clearHighlight();
  }
}

function clearHighlight() {
  document.querySelectorAll('.word-chunk.speaking').forEach(el => {
    el.classList.remove('speaking');
    const plain = (el.dataset.plainText || '').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"');
    if (plain) el.innerHTML = escHtml2(plain);
  });
}

function highlightChunk(idx) {
  clearHighlight();
  const el = document.getElementById('chunk-' + idx);
  if (!el) return;
  el.classList.add('speaking');
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function ttsToggle() {
  if (!audioEl) return;
  if (ttsState === 'idle') {
    ttsState             = 'playing';
    audioEl.playbackRate = ttsRate;
    audioEl.currentTime  = 0;
    ttsCurrentIdx        = -1;   // force first highlight on timeupdate
    highlightChunk(0);
    setTTSBtn('playing');
    audioEl.play().catch(() => {
      alert('Could not play audio/p' + (active + 1) + '.mp3 — make sure the file exists.');
      ttsState = 'idle';
      setTTSBtn('idle');
    });
  } else if (ttsState === 'playing') {
    ttsState = 'paused';
    audioEl.pause();
    setTTSBtn('paused');
  } else if (ttsState === 'paused') {
    ttsState = 'playing';
    setTTSBtn('playing');
    audioEl.play();
  }
}

function ttsStop() {
  if (audioEl) {
    audioEl.pause();
    audioEl.currentTime = 0;
  }
  ttsState      = 'idle';
  ttsCurrentIdx = 0;
  setTTSBtn('idle');
}

renderTabs();
renderContent();
</script>
</body>
</html>
