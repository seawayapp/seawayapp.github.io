  <style>
    :root {
      --navy:       #0f172a;
      --text:       #1e293b;
      --text-muted: #64748b;
      --bg:         #f8fafc;
      --surface:    #ffffff;
      --border:     #e2e8f0;
      --radius:     14px;
      --shadow:     0 2px 12px rgba(0,0,0,0.07);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Inter", "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .page-wrap {
      max-width: 820px;
      margin: 0 auto;
      padding: 36px 20px 60px;
    }

    .page-header {
      text-align: center;
      margin-bottom: 36px;
    }

    .page-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #C65D8A;
      background: #FCE4EC;
      padding: 4px 14px;
      border-radius: 20px;
      margin-bottom: 12px;
    }

    .page-title {
      font-family: "Nunito", sans-serif;
      font-size: clamp(1.7rem, 5vw, 2.4rem);
      font-weight: 900;
      color: var(--text);
      letter-spacing: -0.5px;
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .page-subtitle {
      font-size: 0.95rem;
      color: var(--text-muted);
    }

    .chapter-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
    }

    .chapter-card {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px;
      text-decoration: none;
      color: inherit;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: var(--shadow);
      transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    }

    .chapter-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.11);
      border-color: #F48FB1;
    }

    .chapter-icon {
      font-size: 2.2rem;
      width: 54px;
      height: 54px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .chapter-info {
      flex: 1;
      min-width: 0;
    }

    .chapter-num {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .chapter-title {
      font-family: "Nunito", sans-serif;
      font-size: 1.2rem;
      font-weight: 900;
      color: var(--text);
      margin-bottom: 2px;
    }

    .chapter-sub {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .chapter-arrow {
      font-size: 1.1rem;
      color: #CBD5E1;
      flex-shrink: 0;
    }

    .chapter-card:hover .chapter-arrow {
      color: #F06292;
    }

    @media (max-width: 480px) {
      .chapter-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
