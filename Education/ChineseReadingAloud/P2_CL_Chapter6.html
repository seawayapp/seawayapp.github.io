<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>走路上学 - 朗读练习</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap');

*{box-sizing:border-box;margin:0;padding:0;}

body{
  font-family:'Nunito','PingFang SC','Hiragino Sans GB',sans-serif;
  min-height:100vh;padding:20px 16px 48px;overflow-x:hidden;
  background:#F0F8FF;position:relative;
}

body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 60% 35% at 10% 5%,rgba(255,230,120,0.16) 0%,transparent 65%),
    radial-gradient(ellipse 50% 30% at 85% 15%,rgba(135,206,235,0.18) 0%,transparent 60%),
    radial-gradient(ellipse 45% 28% at 40% 90%,rgba(144,238,144,0.14) 0%,transparent 60%);
  pointer-events:none;z-index:0;
}

.floater{position:fixed;font-size:1.5rem;opacity:0.11;pointer-events:none;z-index:0;animation:floatUp 9s ease-in-out infinite;}
@keyframes floatUp{0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-16px) rotate(8deg);}}

.con{max-width:760px;margin:0 auto;position:relative;z-index:1;}

/* ── HERO ── */
.hero{text-align:center;padding:14px 0 16px;}
.hero-scene{
  display:flex;justify-content:center;align-items:flex-end;
  gap:4px;margin-bottom:10px;font-size:1.9rem;
  background:linear-gradient(180deg,#87CEEB 0%,#E0F4FF 60%,#90EE90 100%);
  border-radius:20px;padding:14px 10px 8px;
  box-shadow:0 4px 16px rgba(135,206,235,0.25);
  position:relative;overflow:hidden;
}
.hs-item{display:inline-block;animation:walk 1.8s ease-in-out infinite;}
.hs-item:nth-child(1){animation-delay:0s;}
.hs-item:nth-child(2){animation-delay:0.2s;}
.hs-item:nth-child(3){animation-delay:0.4s;}
.hs-item:nth-child(4){animation-delay:0.6s;}
.hs-item:nth-child(5){animation-delay:0.8s;}
.hs-item:nth-child(6){animation-delay:1.0s;}
.hs-item:nth-child(7){animation-delay:1.2s;}
@keyframes walk{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}

h1{font-size:2rem;font-weight:900;color:#1A6B3A;text-shadow:2px 3px 0 rgba(255,255,255,0.9);letter-spacing:3px;margin-bottom:3px;}
.subtitle{font-size:0.85rem;font-weight:800;color:#5A9A6A;letter-spacing:2px;margin-bottom:18px;}

/* ── STARS ── */
.star-row{display:flex;align-items:center;justify-content:center;gap:3px;margin-bottom:12px;}
.spip{font-size:1.4rem;filter:grayscale(1) opacity(0.22);transition:filter 0.3s;}
.spip.lit{filter:none;animation:sPop 0.4s ease;}
@keyframes sPop{0%{transform:scale(1);}50%{transform:scale(1.7) rotate(18deg);}100%{transform:scale(1);}}
#slbl{font-size:0.8rem;font-weight:800;color:#5A9A6A;margin-left:6px;}

/* ── PROGRESS ── */
.prog-wrap{background:#C8E6C9;border-radius:50px;height:12px;margin-bottom:16px;overflow:hidden;border:2px solid #A5D6A7;}
.prog-fill{height:100%;background:linear-gradient(90deg,#1A6B3A,#4CAF50,#8BC34A);border-radius:50px;width:0%;transition:width 0.6s cubic-bezier(.4,0,.2,1);}

/* ── CONTROLS ── */
.controls{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.btn{border:none;border-radius:50px;padding:9px 17px;font-size:0.86rem;font-weight:800;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;font-family:inherit;display:flex;align-items:center;gap:5px;}
.btn:active{transform:scale(0.93)!important;}
.btn-a{background:#1A6B3A;color:#fff;box-shadow:0 4px 0 #0D3D20;}
.btn-a:hover{transform:translateY(-2px);box-shadow:0 6px 0 #0D3D20;}
.btn-b{background:#2196F3;color:#fff;box-shadow:0 4px 0 #1565C0;}
.btn-b:hover{transform:translateY(-2px);box-shadow:0 6px 0 #1565C0;}
.btn-c{background:#FF9800;color:#fff;box-shadow:0 4px 0 #E65100;}
.btn-c:hover{transform:translateY(-2px);box-shadow:0 6px 0 #E65100;}
.btn-d{background:#9C27B0;color:#fff;box-shadow:0 4px 0 #6A1B9A;}
.btn-d:hover{transform:translateY(-2px);box-shadow:0 6px 0 #6A1B9A;}

/* ── SPEED ── */
.spd-row{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:16px;font-size:0.8rem;font-weight:800;color:#5A9A6A;}
.spd-btn{background:white;border:2px solid #A5D6A7;border-radius:20px;padding:3px 11px;font-size:0.77rem;font-weight:800;color:#1A6B3A;cursor:pointer;font-family:inherit;transition:all 0.15s;}
.spd-btn.active{background:#1A6B3A;color:white;border-color:#1A6B3A;}
.spd-btn:hover{transform:scale(1.06);}

/* ── KEYWORD BAR ── */
.kw-bar{background:linear-gradient(135deg,#E8F5E9,#E3F2FD);border:2px dashed #81C784;border-radius:18px;padding:12px 15px;margin-bottom:14px;}
.kw-title{font-size:0.77rem;font-weight:900;color:#1A6B3A;margin-bottom:8px;display:flex;align-items:center;gap:5px;}
.kw-chips{display:flex;flex-wrap:wrap;gap:7px;}
.kw-chip{background:white;border:2px solid #81C784;border-radius:20px;padding:4px 12px;font-size:0.86rem;font-weight:800;color:#1A6B3A;cursor:pointer;transition:all 0.15s;font-family:inherit;}
.kw-chip .kp{display:block;font-size:0.58rem;color:#5A9A6A;font-weight:700;line-height:1.2;margin-bottom:1px;}
.kw-chip:hover{background:#1A6B3A;color:white;border-color:#1A6B3A;transform:scale(1.05);}
.kw-chip:hover .kp{color:rgba(255,255,255,0.7);}
.kw-chip:active{transform:scale(0.94);}

/* ── WALKING ROUTE GAME ── */
.route-game{background:white;border-radius:22px;padding:18px 20px;margin-bottom:14px;box-shadow:0 4px 18px rgba(26,107,58,0.09);border:2px solid #A5D6A7;}
.rg-title{font-size:0.8rem;font-weight:900;color:#1A6B3A;margin-bottom:12px;display:flex;align-items:center;gap:5px;}

/* Horizontal route strip */
.route-strip{
  display:flex;align-items:center;gap:0;
  background:linear-gradient(90deg,#FFF9E6,#E8F5E9,#E3F2FD,#F3E5F5,#E8F5E9);
  border-radius:16px;padding:12px 10px;margin-bottom:12px;
  overflow-x:auto;border:2px solid #C8E6C9;
  scrollbar-width:thin;
}
.route-stop{
  display:flex;flex-direction:column;align-items:center;
  min-width:70px;flex-shrink:0;cursor:pointer;
  transition:transform 0.2s;
}
.route-stop:hover{transform:scale(1.08);}
.rs-icon{font-size:1.8rem;display:block;margin-bottom:3px;filter:drop-shadow(1px 2px 3px rgba(0,0,0,0.15));}
.rs-label{font-size:0.65rem;font-weight:800;color:#3D5A3D;text-align:center;line-height:1.2;}
.rs-stamp{font-size:0.75rem;display:none;margin-top:2px;}
.route-stop.visited .rs-stamp{display:block;}
.route-stop.visited .rs-icon{filter:drop-shadow(0 0 6px rgba(26,107,58,0.5));}

.route-arrow{font-size:1.2rem;color:#A5D6A7;flex-shrink:0;padding:0 3px;}

.rg-instr{font-size:0.82rem;font-weight:800;color:#5A9A6A;text-align:center;margin-bottom:10px;min-height:20px;transition:color 0.3s;}
.rg-instr.ok{color:#1A6B3A;}.rg-instr.bad{color:#E53935;}

/* Activity cards: what are people doing in the park? */
.activity-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px;}
.act-card{
  background:#F1F8E9;border:2px solid #C8E6C9;border-radius:14px;
  padding:8px 6px;text-align:center;cursor:pointer;
  transition:all 0.2s;
}
.act-card:hover{transform:translateY(-3px);box-shadow:0 5px 14px rgba(26,107,58,0.14);}
.act-card.done{background:#E8F5E9;border-color:#4CAF50;cursor:default;}
.ac-emoji{font-size:1.6rem;display:block;margin-bottom:3px;}
.ac-text{font-size:0.72rem;font-weight:800;color:#1A6B3A;}
.ac-check{font-size:0.9rem;display:none;}
.act-card.done .ac-check{display:block;}

.rg-fb{font-size:0.8rem;font-weight:800;color:#4CAF50;text-align:center;min-height:18px;}
.rg-reset{background:none;border:2px solid #A5D6A7;border-radius:20px;padding:5px 14px;font-size:0.77rem;font-weight:800;color:#5A9A6A;cursor:pointer;font-family:inherit;transition:all 0.15s;display:block;margin:8px auto 0;}
.rg-reset:hover{border-color:#1A6B3A;color:#1A6B3A;}

/* ── FLOWER COLOURS GAME ── */
.flower-game{background:white;border-radius:22px;padding:18px 20px;margin-bottom:14px;box-shadow:0 4px 18px rgba(26,107,58,0.08);border:2px solid #C8E6C9;}
.fg-title{font-size:0.8rem;font-weight:900;color:#1A6B3A;margin-bottom:12px;display:flex;align-items:center;gap:5px;}
.flower-row{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:10px;}
.flower-item{
  text-align:center;cursor:pointer;padding:8px 10px;
  border-radius:14px;border:2px solid transparent;
  transition:all 0.2s;background:#FAFAFA;
}
.flower-item:hover{transform:scale(1.1);background:#F1F8E9;border-color:#81C784;}
.fi-emoji{font-size:2rem;display:block;margin-bottom:3px;}
.fi-label{font-size:0.7rem;font-weight:800;color:#555;}
.fg-fb{font-size:0.85rem;font-weight:800;color:#4CAF50;text-align:center;min-height:20px;}

/* ── PARA CARDS ── */
.para-card{background:white;border-radius:22px;padding:20px 22px 14px;margin-bottom:13px;box-shadow:0 4px 16px rgba(26,107,58,0.07);border:3px solid transparent;transition:border-color 0.3s,transform 0.2s,box-shadow 0.3s;cursor:pointer;position:relative;overflow:hidden;}
.para-card::before{content:'';position:absolute;top:0;left:0;width:7px;height:100%;background:#C8E6C9;border-radius:22px 0 0 22px;transition:background 0.3s;}
.para-card.active{border-color:#4CAF50;box-shadow:0 8px 28px rgba(26,107,58,0.16);transform:translateY(-2px);}
.para-card.active::before{background:#1A6B3A;}
.para-card.done{border-color:#AED581;background:linear-gradient(135deg,#FAFFFE,#F1F8E9);}
.para-card.done::before{background:#8BC34A;}
.card-hdr{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.card-ico{font-size:1.7rem;width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.card-lbl{font-size:0.75rem;font-weight:900;color:white;padding:3px 12px;border-radius:20px;letter-spacing:1px;}
.done-tick{margin-left:auto;font-size:1.3rem;display:none;animation:pop 0.35s ease;}
@keyframes pop{0%{transform:scale(0) rotate(-20deg);}70%{transform:scale(1.3) rotate(5deg);}100%{transform:scale(1);}}
.para-card.done .done-tick{display:block;}

/* Activity list styling (有的…有的…有的…) */
.activity-list{background:#F1F8E9;border-radius:12px;padding:10px 14px;margin:6px 0;border-left:3px solid #4CAF50;}
.al-item{display:flex;align-items:center;gap:6px;padding:3px 0;font-size:0.88rem;font-weight:800;color:#1A6B3A;}
.al-dot{width:8px;height:8px;border-radius:50%;background:#4CAF50;flex-shrink:0;}

/* ── RUBY ── */
.text-area{line-height:2.6;word-break:break-all;}
ruby{display:inline-flex;flex-direction:column-reverse;align-items:center;margin:0 1px;vertical-align:bottom;}
ruby rt{font-size:0.57em;font-weight:800;color:#1A6B3A;line-height:1.2;user-select:none;transition:opacity 0.3s;font-family:'Nunito',sans-serif;}
ruby rb{font-size:1.32rem;font-weight:700;color:#1A2E1A;cursor:pointer;display:inline-block;padding:2px 3px;border-radius:6px;transition:background 0.15s,transform 0.1s;}
ruby:hover rb{background:#DCEDC8;transform:scale(1.13);}
ruby.hl rb{background:#FFE082;border-radius:6px;}
.punc{font-size:1.32rem;font-weight:700;color:#A5C8A5;margin:0 1px;}
body.pin-off ruby rt{opacity:0;}
.read-hint{font-size:0.7rem;color:#B8D8B8;margin-top:7px;text-align:right;font-weight:800;}

/* ── QUIZ ── */
.quiz-card{background:linear-gradient(135deg,#E8F5E9,#E3F2FD);border:2px solid #81C784;border-radius:20px;padding:16px 20px;margin-bottom:14px;}
.quiz-hdr{font-size:0.8rem;font-weight:900;color:#1A6B3A;margin-bottom:9px;display:flex;align-items:center;gap:5px;}
.quiz-q{font-size:0.98rem;font-weight:800;color:#0D3D20;margin-bottom:11px;}
.ans-grid{display:flex;flex-wrap:wrap;gap:7px;}
.ans-btn{background:white;border:2px solid #81C784;border-radius:12px;padding:7px 14px;font-size:0.86rem;font-weight:800;color:#1A6B3A;cursor:pointer;transition:all 0.15s;font-family:inherit;}
.ans-btn:hover:not(:disabled){background:#E8F5E9;transform:scale(1.04);}
.ans-btn.correct{background:#4CAF50;color:white;border-color:#1A6B3A;}
.ans-btn.wrong{background:#EF5350;color:white;border-color:#B71C1C;}
.quiz-fb{font-size:0.86rem;font-weight:800;margin-top:7px;min-height:20px;}
.quiz-fb.ok{color:#1A6B3A;}.quiz-fb.bad{color:#B71C1C;}

/* ── CELEBRATE ── */
.cel-card{display:none;text-align:center;background:white;border-radius:24px;padding:26px 20px;box-shadow:0 10px 40px rgba(26,107,58,0.14);border:3px solid #AED581;margin-bottom:20px;}
.cel-card.show{display:block;animation:riseUp 0.5s ease;}
@keyframes riseUp{from{opacity:0;transform:translateY(22px) scale(0.95);}to{opacity:1;transform:translateY(0) scale(1);}}
.cel-emoji{font-size:3.6rem;display:block;margin-bottom:10px;}
.cel-title{font-size:1.4rem;font-weight:900;color:#1A6B3A;letter-spacing:2px;margin-bottom:5px;}
.cel-sub{font-size:0.9rem;color:#5A9A6A;font-weight:700;}

.conf-host{position:fixed;top:0;left:0;width:100%;height:0;pointer-events:none;z-index:999;overflow:visible;}
.cp{position:absolute;width:10px;height:10px;border-radius:2px;animation:cpFly 1.5s ease-out forwards;}
@keyframes cpFly{0%{transform:translate(var(--sx),var(--sy)) rotate(0deg);opacity:1;}100%{transform:translate(var(--ex),var(--ey)) rotate(540deg);opacity:0;}}

@media(max-width:480px){
  h1{font-size:1.6rem;}
  .para-card{padding:14px 14px 10px;}
  ruby rb,.punc{font-size:1.12rem;}
  .activity-grid{grid-template-columns:repeat(3,1fr);}
}
</style>

<div class="con">

  <div class="hero">
    <div class="hero-scene">

  <div class="controls">
    <button class="btn btn-a" onclick="togglePin()">🔤 <span id="pinBtn">隐藏拼音</span></button>
    <button class="btn btn-b" onclick="readAll()">🔊 朗读全文</button>
    <button class="btn btn-c" onclick="hlAll()">✨ 逐句朗读</button>
    <button class="btn btn-d" onclick="resetAll()">🔄 重新开始</button>
  </div>

  <div class="spd-row">
    朗读速度：
    <button class="spd-btn" id="ss" onclick="setSpd(0.6)">慢</button>
    <button class="spd-btn active" id="sn" onclick="setSpd(0.85)">正常</button>
    <button class="spd-btn" id="sf" onclick="setSpd(1.1)">快</button>
  </div>

  <!-- KEYWORDS -->
  <div class="kw-bar">
    <div class="kw-title">🌿 词语点一点，听发音：</div>
    <div class="kw-chips" id="kwChips"></div>
  </div>

  <!-- GAME 1: WALKING ROUTE -->
  <div class="route-game">
    <div class="rg-title">🗺️ 走路上学！按顺序点击经过的地方！</div>

    <div class="fg-title" style="font-size:0.8rem;font-weight:900;color:#1A6B3A;margin-bottom:8px;display:flex;align-items:center;gap:5px;">🏃 公园里的人在做什么？点击找一找！</div>
    <div class="activity-grid" id="actGrid"></div>
    <div class="rg-fb" id="rgFb"></div>
    <button class="rg-reset" onclick="resetRoute()">🔄 重新走</button>
  </div>

  <!-- GAME 2: FLOWER COLOURS -->
  <div class="flower-game">
    <div class="fg-title">🌸 天桥上有五颜六色的花！点花朵，听花的颜色！</div>
    <div class="flower-row" id="flowerRow"></div>
    <div class="fg-fb" id="fgFb"></div>
  </div>

  <!-- PARAGRAPHS -->
  <div id="parasCon"></div>

  <!-- QUIZ -->
  <div class="quiz-card">
    <div class="quiz-hdr">🧠 想一想！</div>
    <div class="quiz-q" id="quizQ"></div>
    <div class="ans-grid" id="ansGrid"></div>
    <div class="quiz-fb" id="quizFb"></div>
  </div>

  <div class="cel-card" id="celCard">
    <span class="cel-emoji">🚶‍♂️🌳🏫</span>
    <div class="cel-title">走得真棒！</div>
    <div class="cel-sub">你读完了《走路上学》！明天也走路上学吧，边走边看，多开心！😊</div>
  </div>

</div>
<div class="conf-host" id="confHost"></div>

    sentences:[
      {chunks:['我们','经过','公园','。'],pins:['wǒ men','jīng guò','gōng yuán','']},
      {chunks:['公园里','有','高高的','树，'],pins:['gōng yuán lǐ','yǒu','gāo gāo de','shù，']},
      {chunks:['还有','绿绿的','草地','。'],pins:['hái yǒu','lǜ lǜ de','cǎo dì','']},
      {chunks:['公园里的','人','真多，'],pins:['gōng yuán lǐ de','rén','zhēn duō，']},
      {chunks:['有的','在','跑步，'],pins:['yǒu de','zài','pǎo bù，']},
      {chunks:['有的','在','骑','脚踏车，'],pins:['yǒu de','zài','qí','jiǎo tà chē，']},
      {chunks:['有的','在','做','早操','。'],pins:['yǒu de','zài','zuò','zǎo cāo','']},
    ]
  },
  {
    icon:'😊', bg:'#E3F2FD', color:'#1565C0', label:'第五段',
    sentences:[
      {chunks:['我','和','爸爸','有说有笑地','走到','学校','。'],pins:['wǒ','hé','bà ba','yǒu shuō yǒu xiào de','zǒu dào','xué xiào','']},
    ]
  },
  {
    icon:'💭', bg:'#F3E5F5', color:'#7B1FA2', label:'第六段',
    sentences:[
      {chunks:['明天，'],pins:['míng tiān，']},
      {chunks:['我','还想','走路上学','。'],pins:['wǒ','hái xiǎng','zǒu lù shàng xué','']},
    ]
  }
];

const keywords = [
  {w:'走路上学',p:'zǒu lù shàng xué'},{w:'组屋',p:'zǔ wū'},{w:'邻居',p:'lín jū'},
  {w:'互相',p:'hù xiāng'},{w:'早安',p:'zǎo ān'},{w:'行人天桥',p:'xíng rén tiān qiáo'},
  {w:'五颜六色',p:'wǔ yán liù sè'},{w:'阳光',p:'yáng guāng'},{w:'美丽极了',p:'měi lì jí le'},
  {w:'经过',p:'jīng guò'},{w:'脚踏车',p:'jiǎo tà chē'},{w:'有说有笑',p:'yǒu shuō yǒu xiào'},
];

const routeStops = [
  {id:'home',   icon:'🏠', label:'家',    order:0},
  {id:'hdb',    icon:'🏢', label:'组屋楼下',order:1},
  {id:'bridge', icon:'🌉', label:'行人天桥',order:2},
  {id:'park',   icon:'🌳', label:'公园',   order:3},
  {id:'school', icon:'🏫', label:'学校',   order:4},
];

const activities = [
  {emoji:'🏃',label:'跑步',text:'有的在跑步'},
  {emoji:'🚴',label:'骑脚踏车',text:'有的在骑脚踏车'},
  {emoji:'🤸',label:'做早操',text:'有的在做早操'},
];

const flowers = [
  {emoji:'🌹',color:'红色',pin:'hóng sè'},{emoji:'🌷',color:'粉色',pin:'fěn sè'},
  {emoji:'🌻',color:'黄色',pin:'huáng sè'},{emoji:'💜',color:'紫色',pin:'zǐ sè'},
  {emoji:'🌸',color:'粉红色',pin:'fěn hóng sè'},{emoji:'🌼',color:'白色',pin:'bái sè'},
  {emoji:'🔵',color:'蓝色',pin:'lán sè'},{emoji:'🟠',color:'橙色',pin:'chéng sè'},
];

const quizzes = [
  {q:'他们走到组屋楼下，看见了谁？',opts:['老师','邻居','同学'],ans:1,fb:['再想想～','🎉 对！看见了邻居！','再想想～']},
  {q:'天桥两旁有什么？',opts:['五颜六色的花','高高的树','绿绿的草地'],ans:0,fb:['🎉 对！天桥两旁开着五颜六色的花！','再想想～','再想想～']},
  {q:'公园里的人在做什么？（选一个正确的）',opts:['游泳','跑步','踢足球'],ans:1,fb:['再想想～','🎉 对！有的在跑步！','再想想～']},
  {q:'他们是怎样走到学校的？',opts:['有说有笑','哭哭啼啼','安安静静'],ans:0,fb:['🎉 对！有说有笑地走到学校！','再想想～','再想想～']},
];

/* ── STATE ── */
let pinOn=true, spd=0.85, donePi=new Set(), stars=0, hlActive=false, quizIdx=0;
let routeNext=0, actDone=new Set();
const TOTAL=paras.length, MAX_STARS=7;

/* ── BUILD ── */
buildKW(); buildRoute(); buildFlowers(); buildParas(); loadQuiz(0);

function buildKW(){
  const c=document.getElementById('kwChips');
  keywords.forEach(k=>{
    const b=document.createElement('button'); b.className='kw-chip';
    b.innerHTML=`<span class="kp">${k.p}</span>${k.w}`;
    b.onclick=()=>speak(k.w); c.appendChild(b);
  });
}

/* ── ROUTE GAME ── */
function buildRoute(){
  const strip=document.getElementById('routeStrip'); strip.innerHTML='';
  routeStops.forEach((stop,i)=>{
    const el=document.createElement('div'); el.className='route-stop'; el.id=`rs-${stop.id}`;
    el.innerHTML=`<span class="rs-icon">${stop.icon}</span><span class="rs-label">${stop.label}</span><span class="rs-stamp">✅</span>`;
    el.onclick=()=>visitStop(stop,el);
    strip.appendChild(el);
    if(i<routeStops.length-1){
      const arr=document.createElement('span'); arr.className='route-arrow'; arr.textContent='→';
      strip.appendChild(arr);
    }
  });

  // activity grid
  const ag=document.getElementById('actGrid'); ag.innerHTML='';
  activities.forEach((act,i)=>{
    const card=document.createElement('div'); card.className='act-card'; card.id=`act-${i}`;
    card.innerHTML=`<span class="ac-emoji">${act.emoji}</span><span class="ac-text">${act.label}</span><span class="ac-check">✅</span>`;
    card.onclick=()=>doActivity(act,card,i);
    ag.appendChild(card);
  });

  routeNext=0; actDone=new Set();
  document.getElementById('rgInstr').textContent='从家出发，点击第一个地方！';
  document.getElementById('rgInstr').className='rg-instr info';
  document.getElementById('rgFb').textContent='';
}

function visitStop(stop,el){
  if(stop.order!==routeNext){
    document.getElementById('rgInstr').textContent='❌ 按顺序走哦！先到哪里？';
    document.getElementById('rgInstr').className='rg-instr bad';
    setTimeout(()=>{
      document.getElementById('rgInstr').className='rg-instr';
      document.getElementById('rgInstr').textContent=routeNext===0?'从家出发！':'继续走下一站！';
    },900);
    return;
  }
  el.classList.add('visited');
  speak(stop.label);
  routeNext++;
  const instrs=['从家出发，走到组屋楼下！','说完早安，走上行人天桥！','看完花，经过公园！','穿过公园，走到学校！','🎉 到学校了！'];
  document.getElementById('rgInstr').textContent=instrs[stop.order];
  document.getElementById('rgInstr').className='rg-instr '+(stop.order===4?'ok':'');
  if(stop.order===4) gainStar();
}

function doActivity(act,card,i){
  if(actDone.has(i)) return;
  card.classList.add('done'); actDone.add(i);
  speak(act.text);
  if(actDone.size===activities.length){
    document.getElementById('rgFb').textContent='🎉 全找到了！公园真热闹！';
    gainStar();
  } else {
    document.getElementById('rgFb').textContent=`✅ ${act.text}！继续找！`;
  }
}

function resetRoute(){buildRoute();}

/* ── FLOWER GAME ── */
function buildFlowers(){
  const row=document.getElementById('flowerRow'); row.innerHTML='';
  flowers.forEach(f=>{
    const el=document.createElement('div'); el.className='flower-item';
    el.innerHTML=`<span class="fi-emoji">${f.emoji}</span><span class="fi-label">${f.color}</span>`;
    el.onclick=()=>{
      speak(`${f.color}的花`);
      document.getElementById('fgFb').textContent=`🌸 ${f.color}（${f.pin}）`;
      document.getElementById('fgFb').style.color='#E91E63';
    };
    row.appendChild(el);
  });
}

/* ── PARAGRAPHS ── */
function buildParas(){
  const con=document.getElementById('parasCon'); con.innerHTML='';
  paras.forEach((para,pi)=>{
    const card=document.createElement('div'); card.className='para-card'; card.id=`pc${pi}`;
    const hdr=document.createElement('div'); hdr.className='card-hdr';
    const ico=document.createElement('div'); ico.className='card-ico'; ico.style.background=para.bg; ico.textContent=para.icon;
    const lbl=document.createElement('div'); lbl.className='card-lbl'; lbl.style.background=para.color; lbl.textContent=para.label;
    const tick=document.createElement('div'); tick.className='done-tick'; tick.textContent='✅';
    hdr.appendChild(ico); hdr.appendChild(lbl); hdr.appendChild(tick);

    const ta=document.createElement('div'); ta.className='text-area'; ta.id=`ta${pi}`;

    // Special rendering for para 3 (有的 list)
    if(pi===3){
      // normal sentences first
      const normalSents=para.sentences.slice(0,4);
      normalSents.forEach((sent,si)=>appendSent(ta,sent,pi,si));
      // 有的 list
      const listDiv=document.createElement('div'); listDiv.className='activity-list';
      para.sentences.slice(4).forEach((sent,sii)=>{
        const si=sii+4;
        const item=document.createElement('div'); item.className='al-item';
        const dot=document.createElement('div'); dot.className='al-dot'; item.appendChild(dot);
        const textSpan=document.createElement('span'); textSpan.id=`snt${pi}_${si}`;
        sent.chunks.forEach((ch,ci)=>{
          appendChunk(textSpan,ch,sent.pins[ci],pi,si,ci);
        });
        item.appendChild(textSpan); listDiv.appendChild(item);
      });
      ta.appendChild(listDiv);
    } else {
      para.sentences.forEach((sent,si)=>appendSent(ta,sent,pi,si));
    }

    const hint=document.createElement('div'); hint.className='read-hint'; hint.textContent='👆 点击这段来朗读';
    card.appendChild(hdr); card.appendChild(ta); card.appendChild(hint);
    card.onclick=()=>{setActive(pi);readPara(pi);};
    con.appendChild(card);
  });
}

function appendSent(container,sent,pi,si){
  const wrap=document.createElement('span'); wrap.id=`snt${pi}_${si}`;
  sent.chunks.forEach((ch,ci)=>appendChunk(wrap,ch,sent.pins[ci],pi,si,ci));
  container.appendChild(wrap);
}

function appendChunk(container,ch,pin,pi,si,ci){
  const isPunc=/^[，。！？""：；、…—·\s""]+$/.test(ch);
  if(isPunc){
    const sp=document.createElement('span');sp.className='punc';sp.textContent=ch;container.appendChild(sp);
  } else {
    const hasTr=/[，。！？"：；]$/.test(ch);
    const txt=hasTr?ch.slice(0,-1):ch; const tr=hasTr?ch.slice(-1):'';
    const r=document.createElement('ruby'); r.id=`rb${pi}_${si}_${ci}`;
    const rt=document.createElement('rt'); rt.textContent=pin||'';
    const rb=document.createElement('rb'); rb.textContent=txt;
    rb.onclick=(e)=>{e.stopPropagation();speak(txt);flash(r);};
    r.appendChild(rt); r.appendChild(rb); container.appendChild(r);
    if(tr){const ps=document.createElement('span');ps.className='punc';ps.textContent=tr;container.appendChild(ps);}
  }
}

/* ── CORE ── */
function setActive(pi){document.querySelectorAll('.para-card').forEach((c,i)=>c.classList.toggle('active',i===pi));}
function readPara(pi){speak(paras[pi].sentences.map(s=>s.chunks.join('')).join(''));markDone(pi);}
function markDone(pi){
  const card=document.getElementById(`pc${pi}`);
  if(card.classList.contains('done'))return;
  card.classList.add('done'); donePi.add(pi); gainStar(); updateProg();
  if(donePi.size===TOTAL) setTimeout(celebrate,700);
}
function gainStar(){
  if(stars>=MAX_STARS)return;
  document.getElementById(`sp${stars}`).classList.add('lit'); stars++;
  document.getElementById('slbl').textContent=`${stars} / ${MAX_STARS}`;
}
function updateProg(){document.getElementById('pFill').style.width=(donePi.size/TOTAL*100)+'%';}
function speak(txt,rate){
  if(!window.speechSynthesis)return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(txt); u.lang='zh-CN'; u.rate=rate||spd; speechSynthesis.speak(u);
}
function speakWait(txt){
  return new Promise(res=>{
    if(!window.speechSynthesis){setTimeout(res,800);return;}
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(txt); u.lang='zh-CN'; u.rate=spd;
    u.onend=res; u.onerror=res; speechSynthesis.speak(u);
    setTimeout(res,txt.length*660+1800);
  });
}
async function hlAll(){
  if(hlActive){speechSynthesis.cancel();hlActive=false;return;}
  hlActive=true;
  for(let pi=0;pi<paras.length&&hlActive;pi++){
    setActive(pi);
    for(let si=0;si<paras[pi].sentences.length&&hlActive;si++){
      hlSent(pi,si,true);
      await speakWait(paras[pi].sentences[si].chunks.join(''));
      hlSent(pi,si,false);
    }
    markDone(pi);
  }
  hlActive=false;
}
function hlSent(pi,si,on){
  const el=document.getElementById(`snt${pi}_${si}`);
  if(!el)return;
  el.querySelectorAll('ruby').forEach(r=>r.classList.toggle('hl',on));
}
function readAll(){speak(paras.map(p=>p.sentences.map(s=>s.chunks.join('')).join('')).join('　'));}
function togglePin(){pinOn=!pinOn;document.body.classList.toggle('pin-off',!pinOn);document.getElementById('pinBtn').textContent=pinOn?'隐藏拼音':'显示拼音';}
function setSpd(r){
  spd=r; document.querySelectorAll('.spd-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById({0.6:'ss',0.85:'sn',1.1:'sf'}[r]).classList.add('active');
}
function flash(el){el.style.background='#DCEDC8';setTimeout(()=>el.style.background='',420);}
function resetAll(){
  speechSynthesis.cancel(); hlActive=false; donePi.clear(); stars=0;
  document.getElementById('slbl').textContent=`0 / ${MAX_STARS}`;
  document.getElementById('pFill').style.width='0%';
  document.getElementById('celCard').classList.remove('show');
  document.querySelectorAll('.spip').forEach(s=>s.classList.remove('lit'));
  buildRoute(); buildParas(); quizIdx=0; loadQuiz(0);
}

/* ── QUIZ ── */
function loadQuiz(idx){
  const q=quizzes[idx];
  document.getElementById('quizQ').textContent=q.q;
  document.getElementById('quizFb').textContent=''; document.getElementById('quizFb').className='quiz-fb';
  const grid=document.getElementById('ansGrid'); grid.innerHTML='';
  q.opts.forEach((opt,i)=>{
    const b=document.createElement('button'); b.className='ans-btn'; b.textContent=opt;
    b.onclick=()=>checkAns(i,q,grid); grid.appendChild(b);
  });
}
function checkAns(i,q,grid){
  Array.from(grid.children).forEach((b,bi)=>{
    b.disabled=true;
    if(bi===q.ans)b.classList.add('correct');
    else if(bi===i&&i!==q.ans)b.classList.add('wrong');
  });
  const fb=document.getElementById('quizFb');
  fb.textContent=q.fb[i]; fb.className='quiz-fb '+(i===q.ans?'ok':'bad');
  if(i===q.ans){gainStar();setTimeout(()=>{quizIdx=(quizIdx+1)%quizzes.length;loadQuiz(quizIdx);},2000);}
}

/* ── CELEBRATE ── */
function celebrate(){
  document.getElementById('celCard').classList.add('show');
  speak('走得真棒！你读完了走路上学！明天也走路上学吧！',0.85); fireConf();
}
function fireConf(){
  const host=document.getElementById('confHost'); host.innerHTML='';
  const colors=['#1A6B3A','#4CAF50','#2196F3','#FF9800','#9C27B0','#8BC34A','#FFD166'];
  const W=window.innerWidth;
  for(let i=0;i<46;i++){
    const p=document.createElement('div'); p.className='cp';
    const sx=Math.random()*W, sy=Math.random()*120+20;
    const ex=sx+(Math.random()-0.5)*340, ey=sy+Math.random()*440+140;
    p.style.cssText=`left:${sx}px;top:${sy}px;background:${colors[i%colors.length]};--sx:0px;--sy:0px;--ex:${ex-sx}px;--ey:${ey-sy}px;animation-delay:${Math.random()*0.5}s`;
    host.appendChild(p);
  }
  setTimeout(()=>host.innerHTML='',2400);
}
</script>
