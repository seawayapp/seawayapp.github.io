  .answer-btns {

  .answer-btn {

  .answer-btn:hover { background: #E8F5E9; transform: scale(1.03); }

  .answer-btn.wrong { background: #EF9A9A; color: white; border-color: #C62828; }

  .feedback-text {
    font-size: 0.9rem;

</style>

];

    correct: 2,
    feedback: ['再想一想～', '再想一想～', '🎉 答对了！二年级甲班！']
  }
];

let pinyinVisible = true;
let speechRate = 0.85;
let doneCards = new Set();
let stars = 0;
let currentQ = 0;
let isHighlighting = false;
let utterance = null;

function createStars() {
  const bg = document.getElementById('starsBg');
  const colors = ['#FFD700','#FFB6C1','#ADD8E6','#98FB98','#DDA0DD'];
  for (let i = 0; i < 25; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 6 + 3;
    s.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};animation-delay:${Math.random()*4}s;animation-duration:${2+Math.random()*3}s`;
    bg.appendChild(s);
  }
}

function buildKeywords() {
  const container = document.getElementById('keywordChips');
  keywords.forEach(kw => {
    const chip = document.createElement('button');
    chip.className = 'keyword-chip';
    chip.innerHTML = `<ruby><rb>${kw.word}</rb><rt>${kw.pinyin}</rt></ruby>`;
    chip.onclick = () => speakText(kw.word);
    container.appendChild(chip);
  });
}

function buildParagraphs() {
  const container = document.getElementById('paragraphsContainer');
  container.innerHTML = '';
  paragraphs.forEach((para, pi) => {
    const card = document.createElement('div');
    card.className = 'paragraph-card';
    card.id = `para-${pi}`;

    const header = document.createElement('div');
    header.className = 'card-header';

    const iconEl = document.createElement('div');
    iconEl.className = 'card-icon';
    iconEl.style.background = para.bg;
    iconEl.textContent = para.icon;

    const labelEl = document.createElement('div');
    labelEl.className = 'card-label';
    labelEl.style.background = para.color;
    labelEl.textContent = para.label;

    const doneBadge = document.createElement('div');
    doneBadge.className = 'done-badge';
    doneBadge.textContent = '✅';

    header.appendChild(iconEl);
    header.appendChild(labelEl);
    header.appendChild(doneBadge);

    const textArea = document.createElement('div');
    textArea.className = 'text-area';
    textArea.id = `text-${pi}`;

    para.sentences.forEach((sent, si) => {
      const span = document.createElement('span');
      span.className = 'phrase-break';
      span.id = `sent-${pi}-${si}`;
      sent.chars.forEach((chunk, ci) => {
        const isPunc = /[，。！？""：]/.test(chunk);
        if (isPunc && chunk.length === 1) {
          const p = document.createElement('span');
          p.className = 'punc';
          p.textContent = chunk;
          span.appendChild(p);
        } else {
          const r = document.createElement('ruby');
          r.id = `chunk-${pi}-${si}-${ci}`;
          const rb = document.createElement('rb');
          rb.textContent = chunk;
          rb.onclick = (e) => { e.stopPropagation(); speakText(chunk.replace(/[，。！？""：]/g,'')); sparkle(r); };
          const rt = document.createElement('rt');
          rt.textContent = sent.pinyin[ci] || '';
          r.appendChild(rt);
          r.appendChild(rb);
          span.appendChild(r);
        }
      });
      textArea.appendChild(span);
      if (si < para.sentences.length - 1) {
        textArea.appendChild(document.createTextNode(' '));
      }
    });

    const hint = document.createElement('div');
    hint.className = 'play-hint';
    hint.textContent = '👆 点击段落朗读';

    card.appendChild(header);
    card.appendChild(textArea);
    card.appendChild(hint);

    card.onclick = () => {
      setActiveCard(pi);
      readParagraph(pi);
    };

    container.appendChild(card);
  });
}

function setActiveCard(pi) {
  document.querySelectorAll('.paragraph-card').forEach((c, i) => {
    c.classList.toggle('active', i === pi);
  });
}

function speakText(text, rate) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN';
  u.rate = rate || speechRate;
  speechSynthesis.speak(u);
}

function readParagraph(pi) {
  const para = paragraphs[pi];
  const fullText = para.sentences.map(s => s.text).join('');
  speakText(fullText);
  markDone(pi);
}

function markDone(pi) {
  const card = document.getElementById(`para-${pi}`);
  if (!card.classList.contains('done')) {
    card.classList.add('done');
    doneCards.add(pi);
    addStar();
    updateProgress();
    if (doneCards.size === paragraphs.length) {
      setTimeout(() => celebrate(), 600);
    }
  }
}

function addStar() {
  if (stars < 6) {
    const starEl = document.getElementById(`s${stars}`);
    starEl.classList.add('lit');
    setTimeout(() => starEl.classList.remove('lit'), 600);
    stars++;
    document.getElementById('starCount').textContent = stars;
  }
}

function updateProgress() {
  const pct = (doneCards.size / paragraphs.length) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
}

function readAll() {
  const allText = paragraphs.map(p => p.sentences.map(s => s.text).join('')).join('　');
  speakText(allText, speechRate);
}

async function highlightAll() {
  if (isHighlighting) return;
  isHighlighting = true;
  speechSynthesis.cancel();

  for (let pi = 0; pi < paragraphs.length; pi++) {
    setActiveCard(pi);
    for (let si = 0; si < paragraphs[pi].sentences.length; si++) {
      const sent = paragraphs[pi].sentences[si];
      highlightSentence(pi, si, true);
      await speakAndWait(sent.text);
      highlightSentence(pi, si, false);
    }
    markDone(pi);
  }
  isHighlighting = false;
}

function highlightSentence(pi, si, on) {
  const sentEl = document.getElementById(`sent-${pi}-${si}`);
  if (!sentEl) return;
  sentEl.querySelectorAll('ruby').forEach(r => {
    r.classList.toggle('highlighted', on);
  });
}

function speakAndWait(text) {
  return new Promise(resolve => {
    if (!window.speechSynthesis) { setTimeout(resolve, 1000); return; }
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'zh-CN';
    u.rate = speechRate;
    u.onend = resolve;
    u.onerror = resolve;
    speechSynthesis.speak(u);
    setTimeout(resolve, text.length * 600 + 1500);
  });
}

function sparkle(el) {
  el.style.background = '#FFE082';
  setTimeout(() => { el.style.background = ''; }, 400);
}

function togglePinyin() {
  pinyinVisible = !pinyinVisible;
  document.body.classList.toggle('pinyin-off', !pinyinVisible);
  document.getElementById('pinyinBtnText').textContent = pinyinVisible ? '隐藏拼音' : '显示拼音';
}

function setSpeed(rate) {
  speechRate = rate;
  document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
  if (rate === 0.6) document.getElementById('sp-slow').classList.add('active');
  else if (rate === 0.85) document.getElementById('sp-normal').classList.add('active');
  else document.getElementById('sp-fast').classList.add('active');
}

function resetAll() {
  speechSynthesis.cancel();
  isHighlighting = false;
  doneCards.clear();
  stars = 0;
  document.getElementById('starCount').textContent = 0;
  document.getElementById('progressBar').style.width = '0%';
  document.getElementById('celebMsg').classList.remove('show');
  document.querySelectorAll('.star-icon').forEach(s => s.classList.remove('lit'));
  buildParagraphs();
  currentQ = 0;
  loadQuestion(currentQ);
}

function celebrate() {
  document.getElementById('celebMsg').classList.add('show');
  fireConfetti();
  speakText('你太棒了！你读完了整篇课文！', 0.85);
}

function fireConfetti() {
  const burst = document.getElementById('confetti');
  burst.innerHTML = '';
  burst.style.left = '50%';
  burst.style.top = '40%';
  const colors = ['#F06292','#AB47BC','#26C6DA','#66BB6A','#FFB300','#FF7043'];
  for (let i = 0; i < 30; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    const angle = Math.random() * 360;
    const dist = 80 + Math.random() * 120;
    const tx = Math.cos(angle * Math.PI / 180) * dist;
    const ty = Math.sin(angle * Math.PI / 180) * dist - 60;
    piece.style.cssText = `background:${colors[i%colors.length]};--tx:${tx}px;--ty:${ty}px;animation-delay:${Math.random()*0.3}s`;
    burst.appendChild(piece);
  }
  setTimeout(() => burst.innerHTML = '', 1600);
}

function buildQuestion() {
  currentQ = Math.floor(Math.random() * questions.length);
  loadQuestion(currentQ);
}

function loadQuestion(idx) {
  const q = questions[idx];
  document.getElementById('qText').textContent = q.q;
  document.getElementById('feedbackText').textContent = '';
  document.getElementById('feedbackText').className = 'feedback-text';
  const btns = document.getElementById('answerBtns');
  btns.innerHTML = '';
  q.options.forEach((opt, i) => {
    const b = document.createElement('button');
    b.className = 'answer-btn';
    b.textContent = opt;
    b.onclick = () => checkAnswer(i, q, btns);
    btns.appendChild(b);
  });
}

function checkAnswer(i, q, btns) {
  Array.from(btns.children).forEach((b, bi) => {
    b.disabled = true;
    if (bi === q.correct) b.classList.add('correct');
    else if (bi === i && i !== q.correct) b.classList.add('wrong');
  });
  const fb = document.getElementById('feedbackText');
  fb.textContent = q.feedback[i];
  fb.className = 'feedback-text ' + (i === q.correct ? 'correct' : 'wrong');
  if (i === q.correct) {
    addStar();
    setTimeout(() => {
      const next = (currentQ + 1) % questions.length;
      currentQ = next;
      loadQuestion(next);
    }, 2000);
  }
}

createStars();
buildKeywords();
buildParagraphs();
buildQuestion();
</script>
